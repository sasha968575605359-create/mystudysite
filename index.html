<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Study Site - Dynamic Edition</title>
    <style>
        /* Твои основные стили */
        :root { --bg: #0f172a; --text: #f8fafc; --accent: #38bdf8; --card-bg: rgba(30, 41, 59, 0.7); }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background 1s; }
        
        /* Слой для летающих штук */
        #fx-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        .container { position: relative; z-index: 10; padding: 20px; max-width: 600px; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        
        /* Анимация падения (универсальная) */
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.3; }
        }

        .drop { position: absolute; animation: fall linear infinite; }

        /* Темы */
        [data-theme="winter"] { --bg: #1e293b; --accent: #0ea5e9; }
        [data-theme="autumn"] { --bg: #2d1b10; --accent: #f59e0b; }
        [data-theme="summer"] { --bg: #075985; --accent: #facc15; }
        [data-theme="spring"] { --bg: #064e3b; --accent: #4ade80; }
        [data-theme="halloween"] { --bg: #000000; --accent: #ff6600; }
    </style>
</head>
<body>

<div id="fx-layer"></div>

<div class="container">
    <div class="card" style="text-align: center;">
        <h2 id="day-now">Загрузка...</h2>
        <h1 id="lesson-text" style="color: var(--accent);">Уроков сейчас нет</h1>
        <p id="timer-text">Отдыхай!</p>
    </div>

    <div class="card">
        <table id="schedule-body" style="width: 100%; border-collapse: collapse;">
            </table>
    </div>
</div>

<script>
    const fullSchedule = {
        1: [{s:"09:00", e:"09:25", n:"Алгебра"}, {s:"09:35", e:"10:00", n:"География"}],
        2: [{s:"09:00", e:"09:25", n:"Англ"}, {s:"16:00", e:"17:00", n:"🇬🇧 Доп. Англ"}], // ВТОРНИК
        3: [{s:"09:00", e:"09:25", n:"Химия"}, {s:"09:35", e:"10:00", n:"Основы здоровья"}],
        4: [{s:"16:00", e:"17:00", n:"🇬🇧 Доп. Англ"}], // ЧЕТВЕРГ
        // Добавь остальные уроки сюда по образцу выше
    };

    function initFX() {
        const now = new Date();
        const month = now.getMonth() + 1; // 1-12
        const day = now.getDate();
        const layer = document.getElementById('fx-layer');
        let theme = "winter";
        let char = "❄";

        // Логика выбора эффекта
        if (month === 10 && day > 25) { theme = "halloween"; char = "🦇"; }
        else if (month >= 3 && month <= 5) { theme = "spring"; char = "🌸"; }
        else if (month >= 6 && month <= 8) { theme = "summer"; char = "🦋"; }
        else if (month >= 9 && month <= 11) { theme = "autumn"; char = "🍂"; }
        else { theme = "winter"; char = "❄"; }

        document.body.setAttribute('data-theme', theme);

        // Создаем 30 падающих объектов
        for (let i = 0; i < 30; i++) {
            let drop = document.createElement('div');
            drop.className = 'drop';
            drop.innerText = char;
            drop.style.left = Math.random() * 100 + "vw";
            drop.style.fontSize = (Math.random() * 20 + 10) + "px";
            drop.style.animationDuration = (Math.random() * 5 + 5) + "s";
            drop.style.animationDelay = Math.random() * 5 + "s";
            layer.appendChild(drop);
        }
    }

    function update() {
        const now = new Date();
        const day = now.getDay();
        const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        
        document.getElementById('day-now').innerText = now.toLocaleDateString('ru-RU', { weekday: 'long', hour: '2-digit', minute: '2-digit' });

        const lessons = fullSchedule[day] || [];
        const table = document.getElementById('schedule-body');
        table.innerHTML = "<tr><th>Время</th><th>Урок</th></tr>";

        let currentFound = false;
        lessons.forEach(l => {
            let row = table.insertRow();
            if (timeStr >= l.s && timeStr <= l.e) {
                row.style.background = "var(--accent)";
                row.style.color = "#000";
                document.getElementById('lesson-text').innerText = "Сейчас: " + l.n;
                currentFound = true;
            }
            row.innerHTML = `<td>${l.s}-${l.e}</td><td>${l.n}</td>`;
        });

        if (!currentFound) {
            document.getElementById('lesson-text').innerText = "Уроков сейчас нет";
        }
    }

    // Запускаем всё
    initFX();
    update();
    setInterval(update, 60000); // Обновляем раз в минуту
</script>
</body>
</html>
