<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STUDY HUB: MATB OS v5.5 FIXED GRID</title>
    <!-- Google GIS SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg-deep: #020617;
            --card-dark: #0f172a;
            --accent-green: #22c55e;
            --accent-blue: #3b82f6;
            --accent-pink: #ec4899;
            --accent-gold: #f59e0b;
            --text-main: #f8fafc;
            --text-dim: #64748b;
            --border-light: rgba(255, 255, 255, 0.08);
            --glow-green: 0 0 30px rgba(34, 197, 94, 0.4);
            --glow-blue: 0 0 30px rgba(59, 130, 246, 0.4);
            --danger: #ef4444;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; padding: 0; 
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, transparent 70%);
        }

        #fx-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        .petal {
            position: absolute;
            background: linear-gradient(135deg, #ffb7c5, #f472b6);
            border-radius: 150% 0 150% 0;
            opacity: 0.3;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        .app-container {
            max-width: 550px;
            margin: 0 auto;
            padding: 20px 15px 120px;
            position: relative;
            z-index: 10;
        }

        /* CLOCK AREA */
        .clock-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid var(--border-light);
        }

        .clock-time {
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: -4px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .clock-date {
            color: var(--accent-blue);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 3px;
            font-size: 0.8rem;
        }

        /* BANNER */
        .banner {
            border-radius: 35px;
            padding: 30px;
            margin-bottom: 25px;
            text-align: center;
            transition: 0.5s;
        }
        .banner.type-lesson { background: linear-gradient(135deg, #1e3a8a, #3b82f6); box-shadow: var(--glow-blue); }
        .banner.type-break { background: linear-gradient(135deg, #831843, #ec4899); }
        .banner.type-wait { background: #1e293b; border: 1px solid var(--border-light); }
        .banner.type-extra { background: linear-gradient(135deg, #b45309, #f59e0b); box-shadow: 0 0 30px rgba(245, 158, 11, 0.3); }
        
        .banner-label { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; opacity: 0.8; margin-bottom: 8px; }
        .banner-timer { font-size: 4rem; font-weight: 900; }

        /* LISTS */
        .section-card {
            background: rgba(30, 41, 59, 0.2);
            border-radius: 35px;
            padding: 25px;
            border: 1px solid var(--border-light);
            margin-bottom: 20px;
        }

        .section-title {
            font-weight: 900; font-size: 0.9rem; color: var(--text-dim);
            margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::before { content: ''; width: 4px; height: 16px; background: var(--accent-blue); border-radius: 2px; }

        .item {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid transparent;
            transition: 0.3s;
        }
        .item.type-lesson { border-left-color: var(--accent-blue); }
        .item.type-break { border-left-color: var(--accent-pink); opacity: 0.6; }
        .item.type-extra { border-left-color: var(--accent-gold); }
        
        .item.active { 
            background: rgba(255,255,255,0.08); 
            transform: scale(1.02);
            border-left-width: 8px;
        }
        .item.active.type-lesson { border-left-color: var(--accent-green); box-shadow: var(--glow-green); }
        .item.active.type-extra { border-left-color: var(--accent-gold); box-shadow: 0 0 20px rgba(245, 158, 11, 0.4); }

        .item-name { font-weight: 800; font-size: 1.05rem; }
        .item-tag { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        .item-time { font-weight: 800; color: var(--text-dim); }
        .active .item-time { color: #fff; }

        /* CLASSROOM TASKS */
        .task-card {
            background: #fff; color: #000; border-radius: 22px; padding: 20px;
            margin-bottom: 15px; border: 3px solid #000; box-shadow: 6px 6px 0px #000;
        }
        .task-tag { font-size: 0.6rem; font-weight: 900; background: #000; color: #fff; padding: 4px 10px; border-radius: 6px; margin-bottom: 8px; display: inline-block; }
        .task-title { font-weight: 900; font-size: 1.1rem; margin-bottom: 5px; }

        /* NAV */
        .nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            display: flex; padding: 15px 10px 35px; border-top: 1px solid var(--border-light);
            z-index: 1000;
        }
        .nav-btn { flex: 1; text-align: center; color: var(--text-dim); cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--accent-green); }
        .nav-btn i { font-size: 1.5rem; display: block; margin-bottom: 4px; }
        .nav-btn span { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }

        /* SETTINGS / OS VIEW */
        .settings-item {
            padding: 20px; border-bottom: 1px solid var(--border-light);
            display: flex; justify-content: space-between; align-items: center;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="fx-canvas"></div>

    <div class="app-container">
        <header class="clock-card">
            <div class="clock-time" id="clock">00:00</div>
            <div class="clock-date" id="date">ЗАГРУЗКА...</div>
        </header>

        <!-- VIEW: HOME -->
        <div id="view-home">
            <div id="banner" class="banner type-wait">
                <div class="banner-label" id="b-label">Система готова</div>
                <div class="banner-timer" id="b-timer">00:00</div>
            </div>

            <div class="section-card">
                <div class="section-title">РАСПИСАНИЕ MATB</div>
                <div id="schedule-list"></div>
            </div>
        </div>

        <!-- VIEW: TASKS -->
        <div id="view-tasks" class="hidden">
            <div class="section-card">
                <div class="section-title">CLASSROOM ЗАДАНИЯ</div>
                <div id="auth-ui" class="hidden" style="text-align: center; padding: 40px 0;">
                    <button class="task-card" style="width:100%; cursor:pointer" onclick="App.auth()">ВХОД В GOOGLE</button>
                </div>
                <div id="task-list"></div>
            </div>
        </div>

        <!-- VIEW: OS -->
        <div id="view-os" class="hidden">
            <div class="section-card">
                <div class="section-title">MATB OS v5.5</div>
                <div class="settings-item">
                    <span>Уведомления</span>
                    <button class="item-time" style="background:none; border:none; color:var(--accent-green)" onclick="App.toggleNotifs()">ВКЛЮЧИТЬ</button>
                </div>
                <div class="settings-item">
                    <span>Уроки по 25 мин</span>
                    <span class="item-time" style="color:#fff">АКТИВНО</span>
                </div>
                <div class="settings-item">
                    <span>Перемены 10 мин</span>
                    <span class="item-time" style="color:#fff">АКТИВНО</span>
                </div>
                <div class="settings-item" style="border:none">
                    <button style="color:var(--danger); background:none; border:none; font-weight:900" onclick="localStorage.clear(); location.reload();">СБРОС MATB OS</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-btn active" onclick="App.switchView('home', this)">
            <i>🏠</i><span>База</span>
        </div>
        <div class="nav-btn" onclick="App.switchView('tasks', this)">
            <i>📚</i><span>Задачи</span>
        </div>
        <div class="nav-btn" onclick="App.switchView('os', this)">
            <i>⚙️</i><span>OS</span>
        </div>
    </nav>

    <script>
        const CLIENT_ID = '747337328453-pp0c1ncoagvotsjrephg9vlbf300ko90.apps.googleusercontent.com';

        // Сетка 25 мин урок + 10 мин перемена
        const MATB_GRID = [
            { s: "09:00", e: "09:25" }, // Урок 1
            { s: "09:35", e: "10:00" }, // Урок 2
            { s: "10:10", e: "10:35" }, // Урок 3
            { s: "10:45", e: "11:10" }, // Урок 4
            { s: "11:20", e: "11:45" }, // Урок 5
            { s: "11:55", e: "12:20" }  // Урок 6
        ];

        const SUBJECTS = {
            1: ["Алгебра", "География", "Укр. язык", "Биология", "Укр. язык", "Химия"],
            2: ["Геометрия", "Физика", "Укр. язык", "Биология", "Музыка", "Физкультура"],
            3: ["Химия", "Основы здоровья", "Укр. лит", "Алгебра", "История", "Английский"],
            4: ["Геометрия", "Физика", "История", "История", "Технологии", "Английский"],
            5: ["Физкультура", "Укр. язык", "Укр. лит", "Алгебра", "Зарубежка", "Информатика"]
        };

        const App = {
            timeline: [],
            
            init() {
                this.buildTimeline();
                this.renderSchedule();
                this.createSakura();
                setInterval(() => this.tick(), 1000);
                this.tick();
                
                const token = localStorage.getItem('matb_token_v5');
                if (token) this.loadTasks(token);
                else document.getElementById('auth-ui').classList.remove('hidden');
            },

            buildTimeline() {
                const day = new Date().getDay();
                if (day === 0 || day === 6) return;

                const grid = MATB_GRID;
                const subs = SUBJECTS[day];

                const parse = (t) => {
                    const [h, m] = t.split(':').map(Number);
                    return h * 60 + m;
                };

                // Основные уроки
                subs.forEach((name, i) => {
                    const g = grid[i];
                    if (!g) return;
                    
                    this.timeline.push({
                        type: 'lesson',
                        name: name,
                        start: parse(g.s),
                        end: parse(g.e),
                        label: `Урок ${i + 1}`
                    });

                    if (grid[i + 1] && i < subs.length - 1) {
                        this.timeline.push({
                            type: 'break',
                            name: 'Перемена',
                            start: parse(g.e),
                            end: parse(grid[i+1].s),
                            label: 'Отдых'
                        });
                    }
                });

                // Доп. Английский (Вторник и Четверг) - оставляем как было, если не просили менять время допов
                if (day === 2 || day === 4) {
                    this.timeline.push({
                        type: 'extra',
                        name: 'Доп. Английский',
                        start: 16 * 60, // 16:00
                        end: 17 * 60,   // 17:00
                        label: 'SPECIAL'
                    });
                }
            },

            tick() {
                const now = new Date();
                const cur = now.getHours() * 60 + now.getMinutes();
                const sec = now.getSeconds();

                document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
                document.getElementById('date').innerText = now.toLocaleDateString('ru-RU', {weekday: 'long', day: 'numeric', month: 'short'});

                let active = null;
                this.timeline.forEach((it, i) => {
                    const el = document.getElementById(`item-${i}`);
                    if (cur >= it.start && cur < it.end) {
                        active = it;
                        el.classList.add('active');
                        this.updateBanner(it, it.end - cur - 1, 60 - sec);
                    } else {
                        el.classList.remove('active');
                    }
                });

                if (!active) {
                    const next = this.timeline.find(it => it.start > cur);
                    if (next) {
                        this.updateBanner({type: 'wait', name: `След: ${next.name}`}, next.start - cur - 1, 60 - sec);
                    } else {
                        this.updateBanner({type: 'wait', name: 'Смена окончена'}, 0, 0);
                    }
                }
            },

            updateBanner(it, mm, ss) {
                const b = document.getElementById('banner');
                if (!b) return;
                b.className = `banner type-${it.type}`;
                document.getElementById('b-label').innerText = it.name;
                document.getElementById('b-timer').innerText = (mm === 0 && ss === 0 && it.type === 'wait') ? "CHILL" : 
                    `${mm.toString().padStart(2, '0')}:${ss.toString().padStart(2, '0')}`;
            },

            renderSchedule() {
                const list = document.getElementById('schedule-list');
                list.innerHTML = this.timeline.map((it, i) => `
                    <div class="item type-${it.type}" id="item-${i}">
                        <div>
                            <div class="item-tag">${it.label}</div>
                            <div class="item-name">${it.name}</div>
                        </div>
                        <div class="item-time">${Math.floor(it.start/60)}:${(it.start%60).toString().padStart(2,'0')}</div>
                    </div>
                `).join('');
            },

            switchView(view, btn) {
                ['home', 'tasks', 'os'].forEach(v => document.getElementById(`view-${v}`).classList.add('hidden'));
                document.getElementById(`view-${view}`).classList.remove('hidden');
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            },

            auth() {
                const client = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/classroom.courses.readonly https://www.googleapis.com/auth/classroom.coursework.me.readonly',
                    callback: (r) => {
                        if (r.access_token) {
                            localStorage.setItem('matb_token_v5', r.access_token);
                            this.loadTasks(r.access_token);
                        }
                    }
                });
                client.requestAccessToken();
            },

            async loadTasks(token) {
                document.getElementById('auth-ui').classList.add('hidden');
                const list = document.getElementById('task-list');
                try {
                    const res = await fetch('https://classroom.googleapis.com/v1/courses', { headers: { 'Authorization': `Bearer ${token}` } });
                    const data = await res.json();
                    if (!data.courses) return;
                    for (const c of data.courses) {
                        const wRes = await fetch(`https://classroom.googleapis.com/v1/courses/${c.id}/courseWork`, { headers: { 'Authorization': `Bearer ${token}` } });
                        const wData = await wRes.json();
                        if (wData.courseWork) {
                            wData.courseWork.forEach(w => {
                                const div = document.createElement('div');
                                div.className = 'task-card';
                                div.innerHTML = `<div class="task-tag">${c.name}</div><div class="task-title">${w.title}</div>`;
                                div.onclick = () => window.open(w.alternateLink, '_blank');
                                list.appendChild(div);
                            });
                        }
                    }
                } catch(e) { localStorage.removeItem('matb_token_v5'); }
            },

            async toggleNotifs() {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') new Notification("MATB OS", { body: "Система уведомлений активна" });
            },

            createSakura() {
                const c = document.getElementById('fx-canvas');
                for (let i = 0; i < 30; i++) {
                    const p = document.createElement('div');
                    p.className = 'petal';
                    p.style.width = p.style.height = `${Math.random() * 10 + 5}px`;
                    p.style.left = `${Math.random() * 100}vw`;
                    p.style.animationDuration = `${Math.random() * 5 + 5}s`;
                    p.style.animationDelay = `${Math.random() * 5}s`;
                    c.appendChild(p);
                }
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
