<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyHub Ultimate Fix</title>
    <style>
        :root {
            --bg: #064e3b; /* Весенний темно-зеленый */
            --nav-bg: #1e293b;
            --text: #f8fafc;
            --accent: #4ade80;
            --card-bg: rgba(15, 23, 42, 0.8);
            --success: #4ade80;
            --error: #f87171;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- ФОНОВЫЕ ЭФФЕКТЫ --- */
        #fx-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #ground-layer { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; 
            z-index: 2; pointer-events: none; display: flex; 
            justify-content: space-around; align-items: flex-end; padding-bottom: 85px; 
        }

        .flower { position: absolute; top: -10%; animation: fall linear infinite; }
        @keyframes fall {
            0% { transform: translateY(0vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.2; }
        }

        .grass { font-size: 30px; animation: sway 3s ease-in-out infinite alternate; transform-origin: bottom; }
        @keyframes sway { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }

        /* --- КОНТЕНТ --- */
        .container {
            position: relative; z-index: 10; width: 100%; max-width: 600px;
            margin: 0 auto; padding: 20px 20px 100px 20px;
        }

        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        /* --- ТАБЛИЦА --- */
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        tr { transition: 0.3s; }
        td { padding: 15px; background: rgba(255,255,255,0.03); }
        td:first-child { border-radius: 12px 0 0 12px; font-weight: bold; width: 120px; color: var(--accent); }
        td:last-child { border-radius: 0 12px 12px 0; }
        
        .active-lesson { background: var(--accent) !important; color: #000 !important; transform: scale(1.02); font-weight: bold; }
        .active-lesson td { background: transparent; color: #000; }

        /* --- КВЕСТЫ --- */
        .q-text { font-size: 1.3rem; margin: 20px 0; text-align: center; min-height: 50px; }
        .input-box {
            width: 100%; background: rgba(0,0,0,0.3); border: 2px solid var(--accent);
            border-radius: 12px; padding: 15px; color: #fff; text-align: center;
            font-size: 1.1rem; outline: none; margin-bottom: 15px;
        }
        .btn {
            background: var(--accent); color: #000; border: none; padding: 15px;
            border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer;
        }

        /* --- НАВИГАЦИЯ --- */
        .nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: var(--nav-bg); display: flex; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; color: #94a3b8; text-decoration: none; font-size: 0.7rem;
        }
        .nav-item.active { color: var(--accent); background: rgba(255,255,255,0.03); }
    </style>
</head>
<body>

    <div id="fx-layer"></div>
    <div id="ground-layer"></div>

    <div class="container">
        <div id="p-sched" class="page active">
            <div class="glass-card" style="text-align: center;">
                <div id="clock" style="font-size: 2.5rem; font-weight: 800;">00:00:00</div>
                <div id="date-label" style="opacity: 0.7;">Загрузка...</div>
            </div>
            <div class="glass-card">
                <table id="sched-table"></table>
            </div>
        </div>

        <div id="p-quests" class="page">
            <div class="glass-card">
                <div id="q-box" class="q-text">Нажми "Начать"</div>
                <input type="text" id="ans-input" class="input-box" style="display:none">
                <button id="quest-btn" class="btn" onclick="Engine.questAction()">Начать</button>
                <div id="hint" style="text-align:center; margin-top:10px; font-weight:bold;"></div>
            </div>
        </div>

        <div id="p-class" class="page">
            <div class="glass-card" style="text-align: center;">
                <div style="font-size: 3rem;">📚</div>
                <h3>Google Classroom</h3>
                <p>Задания появятся здесь позже.</p>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="Engine.tab('p-sched', this)"><span>📅</span>УРОКИ</div>
        <div class="nav-item" onclick="Engine.tab('p-quests', this)"><span>🎯</span>КВЕСТЫ</div>
        <div class="nav-item" onclick="Engine.tab('p-class', this)"><span>🏫</span>CLASSROOM</div>
    </nav>

    <script>
        const CONFIG = {
            // Расписание с твоими правками времени
            schedule: {
                1: [ // ПН
                    {s:"09:00", e:"09:25", n:"Алгебра"}, {s:"09:35", e:"10:00", n:"География"},
                    {s:"10:10", e:"10:35", n:"Укр. мова"}, {s:"10:45", e:"11:10", n:"Биология"},
                    {s:"11:20", e:"11:45", n:"Укр. мова"}, {s:"11:55", e:"12:20", n:"Химия"},
                    {s:"12:30", e:"12:50", n:"Информатика"}
                ],
                2: [ // ВТ
                    {s:"09:00", e:"09:25", n:"Англ. мова"}, {s:"09:35", e:"10:00", n:"Геометрия"},
                    {s:"10:10", e:"10:35", n:"Физика"}, {s:"10:45", e:"11:10", n:"Укр. мова"},
                    {s:"11:20", e:"11:45", n:"Биология"}, {s:"11:55", e:"12:20", n:"Муз/Рис"},
                    {s:"12:30", e:"12:50", n:"Физра"}, {s:"13:00", e:"13:25", n:"Гром. освіта"},
                    {s:"16:00", e:"17:00", n:"🇬🇧 Доп. Англ"}
                ],
                3: [ // СР
                    {s:"09:00", e:"09:25", n:"Химия"}, {s:"09:35", e:"10:00", n:"Основы здоровья"},
                    {s:"10:10", e:"10:35", n:"Укр. лит"}, {s:"10:45", e:"11:10", n:"Алгебра"},
                    {s:"11:20", e:"11:45", n:"История Укр"}, {s:"11:55", e:"12:20", n:"Англ. мова"},
                    {s:"12:30", e:"12:50", n:"География"}, {s:"13:00", e:"13:25", n:"Биология"}
                ],
                4: [ // ЧТ
                    {s:"09:00", e:"09:25", n:"Геометрия"}, {s:"09:35", e:"10:00", n:"Физика"},
                    {s:"10:10", e:"10:35", n:"Физра"}, {s:"10:45", e:"11:10", n:"Всемирка"},
                    {s:"11:20", e:"11:45", n:"Технологии"}, {s:"11:55", e:"12:20", n:"Англ. мова"},
                    {s:"16:00", e:"17:00", n:"🇬🇧 Доп. Англ"}
                ],
                5: [ // ПТ
                    {s:"09:00", e:"09:25", n:"Физра"}, {s:"09:35", e:"10:00", n:"Укр. мова"},
                    {s:"10:10", e:"10:35", n:"Укр. лит"}, {s:"10:45", e:"11:10", n:"Алгебра"},
                    {s:"11:20", e:"11:45", n:"Зарубежка"}, {s:"11:55", e:"12:20", n:"Информатика"},
                    {s:"12:30", e:"12:50", n:"Немецкий"}
                ]
            },
            quests: [
                {q: "Химия: Формула воды?", a: ["H2O", "H20"]},
                {q: "Алгебра: Дискриминант D = ?", a: ["B2-4AC", "B^2-4AC"]},
                {q: "Физика: Единица силы?", a: ["НЬЮТОН", "N"]},
                {q: "Геометрия: Сумма углов треугольника?", a: ["180"]},
                {q: "Английский: 3-я форма GO?", a: ["GONE"]}
            ]
        };

        const Engine = {
            currentQuest: null,
            solved: [],

            init: function() {
                this.startFX();
                this.updateClock();
                setInterval(() => this.updateClock(), 1000);
            },

            startFX: function() {
                const fx = document.getElementById('fx-layer');
                const gr = document.getElementById('ground-layer');
                // Цветы
                for(let i=0; i<25; i++) {
                    let d = document.createElement('div');
                    d.className = 'flower'; d.innerText = "🌸";
                    d.style.left = Math.random()*100+"vw";
                    d.style.animationDuration = Math.random()*5+5+"s";
                    d.style.animationDelay = Math.random()*5+"s";
                    fx.appendChild(d);
                }
                // Трава
                for(let i=0; i<15; i++) {
                    let g = document.createElement('div');
                    g.className = 'grass'; g.innerText = ["🌿","🌱","🌼"][Math.floor(Math.random()*3)];
                    gr.appendChild(g);
                }
            },

            updateClock: function() {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString();
                document.getElementById('date-label').innerText = now.toLocaleDateString('ru-RU', {weekday:'long', day:'numeric', month:'long'});
                this.renderSched(now);
            },

            renderSched: function(now) {
                const day = now.getDay();
                const curMins = now.getHours()*60 + now.getMinutes();
                const table = document.getElementById('sched-table');
                const lessons = CONFIG.schedule[day] || [];
                
                let html = "";
                lessons.forEach(l => {
                    const [sh, sm] = l.s.split(':').map(Number);
                    const [eh, em] = l.e.split(':').map(Number);
                    const isActive = curMins >= (sh*60+sm) && curMins <= (eh*60+em);
                    html += `<tr class="${isActive ? 'active-lesson' : ''}"><td>${l.s}—${l.e}</td><td>${l.n}</td></tr>`;
                });
                table.innerHTML = html || "<tr><td colspan='2' style='text-align:center'>Сегодня выходной!</td></tr>";
            },

            tab: function(id, el) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                el.classList.add('active');
            },

            questAction: function() {
                const btn = document.getElementById('quest-btn');
                const input = document.getElementById('ans-input');
                
                if(btn.innerText === "Начать" || btn.innerText === "Далее") {
                    this.nextQuest();
                } else {
                    this.checkAns();
                }
            },

            nextQuest: function() {
                const pool = CONFIG.quests.filter(q => !this.solved.includes(q.q));
                if(pool.length === 0) {
                    document.getElementById('q-box').innerText = "🎉 Все квесты пройдены!";
                    document.getElementById('ans-input').style.display = "none";
                    document.getElementById('quest-btn').style.display = "none";
                    return;
                }
                this.currentQuest = pool[Math.floor(Math.random()*pool.length)];
                document.getElementById('q-box').innerText = this.currentQuest.q;
                document.getElementById('ans-input').style.display = "block";
                document.getElementById('ans-input').value = "";
                document.getElementById('quest-btn').innerText = "Проверить";
                document.getElementById('hint').innerText = "";
            },

            checkAns: function() {
                let val = document.getElementById('ans-input').value.trim().toUpperCase();
                // Фикс русской раскладки для формул (H2O, N, B2)
                val = val.replace(/Н/g, 'H').replace(/О/g, 'O').replace(/С/g, 'C').replace(/В/g, 'B');
                
                const correct = this.currentQuest.a.some(a => val === a.toUpperCase());
                const hint = document.getElementById('hint');
                
                if(correct) {
                    hint.innerText = "Правильно! 🔥"; hint.style.color = "var(--success)";
                    this.solved.push(this.currentQuest.q);
                    document.getElementById('quest-btn').innerText = "Далее";
                } else {
                    hint.innerText = "Не-а, подумай еще ❌"; hint.style.color = "var(--error)";
                }
            }
        };

        Engine.init();
    </script>
</body>
</html>
