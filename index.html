<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyHub Ultra 25+</title>
    <style>
        :root {
            --bg: #064e3b;
            --nav-bg: #1e293b;
            --text: #f8fafc;
            --accent: #4ade80;
            --card-bg: rgba(15, 23, 42, 0.9);
            --success: #4ade80;
            --error: #f87171;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; background: var(--bg); color: var(--text);
            min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column;
        }

        /* ЭФФЕКТЫ */
        #fx-layer, #ground-layer { position: fixed; left: 0; width: 100%; pointer-events: none; }
        #fx-layer { top: 0; height: 100%; z-index: 1; }
        #ground-layer { bottom: 0; height: 100px; z-index: 2; display: flex; justify-content: space-around; align-items: flex-end; padding-bottom: 80px; }
        .flower { position: absolute; top: -10%; animation: fall linear infinite; font-size: 20px; }
        @keyframes fall {
            0% { transform: translateY(0vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.2; }
        }
        .grass { font-size: 30px; animation: sway 3s ease-in-out infinite alternate; transform-origin: bottom; }
        @keyframes sway { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }

        /* КОНТЕНТ */
        .container { position: relative; z-index: 10; width: 100%; max-width: 600px; margin: 0 auto; padding: 20px 20px 100px 20px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 24px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        /* ТАБЛИЦА */
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { padding: 14px; background: rgba(255,255,255,0.03); border-radius: 12px; transition: 0.3s; }
        .active-lesson td { background: var(--accent) !important; color: #000 !important; font-weight: bold; transform: scale(1.02); }

        /* КВЕСТЫ */
        .q-text { font-size: 1.3rem; font-weight: 600; margin: 20px 0; text-align: center; min-height: 60px; }
        .input-box {
            width: 100%; background: rgba(0,0,0,0.5); border: 2px solid var(--accent);
            border-radius: 15px; padding: 15px; color: #fff; text-align: center; font-size: 1.1rem; outline: none;
        }
        .btn {
            background: var(--accent); color: #000; border: none; padding: 18px;
            border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 15px;
        }
        .progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.5s; }

        /* НАВИГАЦИЯ */
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--nav-bg); display: flex; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; font-size: 0.7rem; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: rgba(255,255,255,0.03); }
    </style>
</head>
<body>

<div id="fx-layer"></div>
<div id="ground-layer"></div>

<div class="container">
    <div id="p-sched" class="page active">
        <div class="glass-card" style="text-align: center;">
            <div id="clock" style="font-size: 2.5rem; font-weight: 900;">00:00</div>
            <div id="date-label" style="opacity: 0.6; font-size: 0.8rem;">Загрузка...</div>
        </div>
        <div class="glass-card"><table id="sched-table"></table></div>
    </div>

    <div id="p-quests" class="page">
        <div class="glass-card">
            <div id="q-box" class="q-text">Нажми "Начать", чтобы открыть 25 квестов!</div>
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <div id="input-area" style="display: none;">
                <input type="text" id="ans-input" class="input-box" placeholder="Твой ответ...">
            </div>
            <button id="quest-btn" class="btn" onclick="Engine.questAction()">Начать</button>
            <div id="hint" style="text-align:center; margin-top:15px; font-weight:bold;"></div>
            <div style="text-align:center; margin-top:20px; font-size:0.8rem; opacity:0.5;">
                Выполнено: <span id="solved-count">0</span> / <span id="total-count">25</span>
            </div>
            <div onclick="Engine.resetProgress()" style="text-align:center; color:var(--error); font-size:0.6rem; margin-top:20px; cursor:pointer; text-decoration:underline;">СБРОСИТЬ ВСЁ</div>
        </div>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="Engine.tab('p-sched', this)"><span>📅</span>УРОКИ</div>
    <div class="nav-item" onclick="Engine.tab('p-quests', this)"><span>🎯</span>КВЕСТЫ</div>
</nav>

<script>
    const CONFIG = {
        schedule: {
            1: [{s:"09:00",e:"09:25",n:"Алгебра"},{s:"09:35",e:"10:00",n:"География"},{s:"10:10",e:"10:35",n:"Укр. мова"},{s:"10:45",e:"11:10",n:"Биология"},{s:"11:20",e:"11:45",n:"Укр. мова"},{s:"11:55",e:"12:20",n:"Химия"},{s:"12:30",e:"12:50",n:"Информатика"}],
            2: [{s:"09:00",e:"09:25",n:"Англ. мова"},{s:"09:35",e:"10:00",n:"Геометрия"},{s:"10:10",e:"10:35",n:"Физика"},{s:"10:45",e:"11:10",n:"Укр. мова"},{s:"11:20",e:"11:45",n:"Биология"},{s:"11:55",e:"12:20",n:"Муз/Рис"},{s:"12:30",e:"12:50",n:"Физра"},{s:"13:00",e:"13:25",n:"Гром. освіта"},{s:"16:00",e:"17:00",n:"🇬🇧 Доп. Англ"}],
            3: [{s:"09:00",e:"09:25",n:"Химия"},{s:"09:35",e:"10:00",n:"Основы здоровья"},{s:"10:10",e:"10:35",n:"Укр. лит"},{s:"10:45",e:"11:10",n:"Алгебра"},{s:"11:20",e:"11:45",n:"История Укр"},{s:"11:55",e:"12:20",n:"Англ. мова"},{s:"12:30",e:"12:50",n:"География"},{s:"13:00",e:"13:25",n:"Биология"}],
            4: [{s:"09:00",e:"09:25",n:"Геометрия"},{s:"09:35",e:"10:00",n:"Физика"},{s:"10:10",e:"10:35",n:"Физра"},{s:"10:45",e:"11:10",n:"Всемирка"},{s:"11:20",e:"11:45",n:"Технологии"},{s:"11:55",e:"12:20",n:"Англ. мова"},{s:"16:00",e:"17:00",n:"🇬🇧 Доп. Англ"}],
            5: [{s:"09:00",e:"09:25",n:"Физра"},{s:"09:35",e:"10:00",n:"Укр. мова"},{s:"10:10",e:"10:35",n:"Укр. лит"},{s:"10:45",e:"11:10",n:"Алгебра"},{s:"11:20",e:"11:45",n:"Зарубежка"},{s:"11:55",e:"12:20",n:"Информатика"},{s:"12:30",e:"12:50",n:"Немецкий"}]
        },
        quests: [
            {q:"Химия: Формула воды?", a:["H2O","H20"]}, {q:"Алгебра: D = b² - ?", a:["4AC"]},
            {q:"Геометрия: Сумма углов треугольника?", a:["180"]}, {q:"Физика: Единица силы?", a:["НЬЮТОН","N"]},
            {q:"Английский: 3-я форма GO?", a:["GONE"]}, {q:"Биология: Орган дыхания рыб?", a:["ЖАБРЫ"]},
            {q:"География: Самый большой океан?", a:["ТИХИЙ"]}, {q:"История: Кто крестил Русь?", a:["ВЛАДИМИР"]},
            {q:"Информатика: Основа кода сайта?", a:["HTML"]}, {q:"Укр. мова: Частина мови 'читати'?", a:["ДІЄСЛОВО","ГЛАГОЛ"]},
            {q:"Химия: Формула соли?", a:["NACL"]}, {q:"Алгебра: √144 = ?", a:["12"]},
            {q:"Физика: Скорость света ~300 тыс... ?", a:["КМ/С"]}, {q:"Геометрия: Сторона квадрата 5, площадь?", a:["25"]},
            {q:"Биология: Сколько камер в сердце человека?", a:["4"]}, {q:"Английский: Apple - это?", a:["ЯБЛОКО"]},
            {q:"География: Столица Франции?", a:["ПАРИЖ"]}, {q:"История: Год начала Второй мировой?", a:["1939"]},
            {q:"Химия: Газ для дыхания?", a:["КИСЛОРОД","O2"]}, {q:"Алгебра: 2 + 2 * 2 = ?", a:["6"]},
            {q:"Физика: Кто открыл закон тяготения?", a:["НЬЮТОН"]}, {q:"Укр. лит: Автор 'Кобзаря'?", a:["ШЕВЧЕНКО"]},
            {q:"Информатика: Устройство ввода текста?", a:["КЛАВИАТУРА"]}, {q:"Немецкий: 'Ja' - это?", a:["ДА"]},
            {q:"Общее: Спутник Земли?", a:["ЛУНА"]}
        ]
    };

    const Engine = {
        solved: JSON.parse(localStorage.getItem('study_solved') || "[]"),
        current: null,

        init() {
            this.startFX();
            this.updateClock();
            setInterval(() => this.updateClock(), 1000);
            document.getElementById('total-count').innerText = CONFIG.quests.length;
            this.updateUI();
        },

        startFX() {
            const fx = document.getElementById('fx-layer');
            const gr = document.getElementById('ground-layer');
            for(let i=0; i<20; i++) {
                let d = document.createElement('div'); d.className = 'flower'; d.innerText = "🌸";
                d.style.left = Math.random()*100+"vw"; d.style.animationDuration = Math.random()*5+5+"s";
                fx.appendChild(d);
            }
            for(let i=0; i<10; i++) {
                let g = document.createElement('div'); g.className = 'grass'; g.innerText = "🌿";
                gr.appendChild(g);
            }
        },

        updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('date-label').innerText = now.toLocaleDateString('ru-RU', {weekday:'long', day:'numeric', month:'short'});
            this.renderSched(now);
        },

        renderSched(now) {
            const day = now.getDay();
            const mins = now.getHours()*60 + now.getMinutes();
            const table = document.getElementById('sched-table');
            let html = "";
            (CONFIG.schedule[day] || []).forEach(l => {
                const [sh, sm] = l.s.split(':').map(Number);
                const [eh, em] = l.e.split(':').map(Number);
                const active = mins >= (sh*60+sm) && mins <= (eh*60+em);
                html += `<tr class="${active ? 'active-lesson' : ''}"><td>${l.s}-${l.e}</td><td>${l.n}</td></tr>`;
            });
            table.innerHTML = html || "<tr><td style='text-align:center'>Выходной!</td></tr>";
        },

        tab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        },

        questAction() {
            const btn = document.getElementById('quest-btn');
            if(btn.innerText === "Начать" || btn.innerText === "Далее") this.nextQuest();
            else this.checkAns();
        },

        nextQuest() {
            const pool = CONFIG.quests.filter(q => !this.solved.includes(q.q));
            if(pool.length === 0) {
                document.getElementById('q-box').innerText = "🏆 ВСЁ РЕШЕНО!";
                document.getElementById('input-area').style.display = "none";
                document.getElementById('quest-btn').style.display = "none";
                return;
            }
            this.current = pool[Math.floor(Math.random()*pool.length)];
            document.getElementById('q-box').innerText = this.current.q;
            document.getElementById('input-area').style.display = "block";
            document.getElementById('ans-input').value = ""; document.getElementById('ans-input').focus();
            document.getElementById('quest-btn').innerText = "Проверить";
            document.getElementById('hint').innerText = "";
        },

        checkAns() {
            let val = document.getElementById('ans-input').value.trim().toUpperCase()
                      .replace(/Н/g,'H').replace(/О/g,'O').replace(/С/g,'C').replace(/В/g,'B').replace(/А/g,'A');
            const ok = this.current.a.some(a => val === a.toUpperCase());
            const h = document.getElementById('hint');
            if(ok) {
                h.innerText = "Верно! 🔥"; h.style.color = "var(--accent)";
                this.solved.push(this.current.q);
                localStorage.setItem('study_solved', JSON.stringify(this.solved));
                this.updateUI();
                document.getElementById('quest-btn').innerText = "Далее";
            } else {
                h.innerText = "Ошибка ❌"; h.style.color = "var(--error)";
            }
        },

        updateUI() {
            const count = this.solved.length;
            const total = CONFIG.quests.length;
            document.getElementById('solved-count').innerText = count;
            document.getElementById('progress-fill').style.width = (count / total * 100) + "%";
        },

        resetProgress() {
            if(confirm("Сбросить?")) { localStorage.removeItem('study_solved'); location.reload(); }
        }
    };

    Engine.init();
</script>
</body>
</html>
