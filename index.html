<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY HUB: MATB OS v3.6 ULTIMATE EXTREME</title>
    <!-- Google Identity Services for Classroom API -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* PREMIUM DESIGN SYSTEM - MATB SPECIAL EDITION 
           Этот блок содержит все переменные и системные настройки интерфейса.
           Мы используем глубокие цвета для минимизации нагрузки на глаза.
        */
        :root {
            --bg-deep: #06231d;
            --card-dark: #111d2b;
            --accent-green: #4ade80;
            --accent-blue: #3b82f6;
            --accent-orange: #f59e0b;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --shadow-neo: 6px 6px 0px #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --glow-green: 0 0 25px rgba(74, 222, 128, 0.5);
            --glow-blue: 0 0 25px rgba(59, 130, 246, 0.5);
        }

        /* Базовые сбросы и настройки скролла */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            /* Эффект зернистости для текстуры */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3BaseFilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            background-attachment: fixed;
        }

        /* Визуальные эффекты сакуры (Sakura Engine) */
        #fx-canvas {
            position: fixed;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .petal {
            position: absolute;
            background: #ffb7c5;
            border-radius: 150% 0 150% 0;
            opacity: 0.4;
            filter: blur(0.5px);
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); }
            100% { transform: translateY(115vh) rotate(360deg) translateX(50px); }
        }

        /* Контейнер приложения */
        .app-container {
            max-width: 550px;
            margin: 0 auto;
            padding: 20px 20px 140px;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        /* Крупные часы сверху */
        .clock-card {
            background: var(--card-dark);
            border-radius: 45px;
            padding: 60px 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
            overflow: hidden;
        }
        .clock-time {
            font-size: 7rem;
            font-weight: 900;
            line-height: 0.9;
            margin: 0;
            letter-spacing: -6px;
            font-variant-numeric: tabular-nums;
            transition: color 0.3s ease;
        }
        .clock-date {
            color: var(--text-dim);
            font-size: 1.4rem;
            margin-top: 15px;
            text-transform: lowercase;
            font-weight: 500;
        }

        /* Баннер уведомлений */
        .alert-banner {
            background: linear-gradient(135deg, #ef4444, #f59e0b);
            border-radius: 28px;
            padding: 22px 28px;
            display: flex;
            align-items: center;
            gap: 18px;
            font-weight: 900;
            font-size: 1.1rem;
            margin-bottom: 30px;
            box-shadow: 0 12px 25px rgba(239, 68, 68, 0.25);
            animation: pulseBanner 3s infinite ease-in-out;
            cursor: pointer;
        }
        @keyframes pulseBanner {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.02); filter: brightness(1.1); }
        }

        /* Карточки секций */
        .section-card {
            background: var(--card-dark);
            border-radius: 40px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.04);
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 28px;
            font-size: 1.6rem;
            font-weight: 900;
        }

        /* Стили списка расписания */
        .schedule-item {
            background: var(--glass);
            border-radius: 22px;
            padding: 22px 28px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 8px solid rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        /* Подсветка активного урока */
        .schedule-item.active-lesson {
            border-left: 8px solid var(--accent-green);
            background: rgba(74, 222, 128, 0.12);
            box-shadow: var(--glow-green);
            transform: scale(1.03) translateX(5px);
            z-index: 5;
        }
        .schedule-item.active-lesson::after {
            content: "IDLE";
            position: absolute;
            right: 85px;
            font-size: 0.65rem;
            font-weight: 900;
            color: var(--accent-green);
            letter-spacing: 2px;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .lesson-name { font-weight: 800; font-size: 1.2rem; }
        .lesson-time { font-weight: 900; color: var(--text-dim); }
        .active-lesson .lesson-time { color: var(--accent-green); }

        /* Сетка статусов */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .status-box {
            background: var(--glass);
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .status-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
        .status-value { font-size: 2rem; font-weight: 900; }

        /* УЛЬТРА ТАЙМЕР */
        .timer-box {
            grid-column: span 2;
            background: linear-gradient(145deg, rgba(59, 130, 246, 0.15), rgba(0,0,0,0));
            border: 2px solid rgba(59, 130, 246, 0.3);
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }
        .timer-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: translateX(-100%);
            animation: sweep 4s infinite;
        }
        @keyframes sweep { 100% { transform: translateX(100%); } }

        /* Задания */
        .task-card {
            border: 4px solid #000;
            background: #ffffff;
            color: #000000;
            border-radius: 28px;
            padding: 28px;
            margin-top: 25px;
            box-shadow: var(--shadow-neo);
            cursor: pointer;
            transition: 0.2s;
        }
        .task-card:active { transform: translate(3px, 3px); box-shadow: 3px 3px 0px #000; }

        /* Модалка */
        #task-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 5000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 25px;
            backdrop-filter: blur(20px);
        }
        .modal-content {
            background: var(--card-dark);
            border-radius: 45px;
            width: 100%;
            max-width: 480px;
            padding: 45px;
            border: 2px solid var(--accent-green);
            text-align: center;
        }

        /* Навигация */
        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 110px;
            background: rgba(11, 21, 33, 0.98);
            display: flex;
            padding: 15px 0 35px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 2000;
            backdrop-filter: blur(10px);
        }
        .nav-item {
            flex: 1;
            text-align: center;
            color: var(--text-dim);
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .nav-item.active { color: var(--accent-green); }
        .nav-item i { font-style: normal; font-size: 2rem; }

        /* Кнопки */
        .btn-action {
            background: var(--accent-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 24px;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .hidden { display: none !important; }
        .text-neon { text-shadow: 0 0 15px var(--accent-green); color: var(--accent-green) !important; }
        .text-blue-neon { text-shadow: 0 0 15px var(--accent-blue); color: var(--accent-blue) !important; }

        /* Лоадер */
        .loader {
            width: 50px; height: 50px;
            border: 5px solid var(--glass);
            border-top: 5px solid var(--accent-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="fx-canvas"></div>

    <div class="app-container">
        
        <!-- ГЛАВНАЯ СТРАНИЦА -->
        <div id="page-home">
            <div class="clock-card" onclick="App.triggerEasterEgg()">
                <div class="clock-time" id="time-display">00:00</div>
                <div class="clock-date" id="date-display">загрузка даты...</div>
            </div>

            <div id="dynamic-alert" class="alert-banner" onclick="App.switchPage('tasks')">
                <i class="alert-icon">⚡</i>
                <span id="alert-text">ПРОВЕРКА СТАТУСА...</span>
            </div>

            <div class="section-card">
                <div class="section-header"><i>📅</i> Расписание</div>
                <div id="schedule-container">
                    <!-- Рендерится скриптом -->
                </div>
            </div>

            <div class="section-card">
                <div class="section-header"><i>📊</i> Мониторинг</div>
                <div class="status-grid">
                    <div class="status-box">
                        <div class="status-label">Задач в очереди</div>
                        <div id="stat-tasks" class="status-value">0</div>
                    </div>
                    <div class="status-box">
                        <div class="status-label">Текущий этап</div>
                        <div id="stat-lesson" class="status-value">-</div>
                    </div>
                    <!-- БЛОК ОБРАТНОГО ОТСЧЕТА -->
                    <div class="status-box timer-box">
                        <div id="timer-label" class="status-label">Инициализация...</div>
                        <div id="timer-value" class="status-value text-blue-neon">--:--</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- СТРАНИЦА ЗАДАНИЙ -->
        <div id="page-tasks" class="hidden">
            <div class="section-card" style="min-height: 600px;">
                <div class="section-header"><i>🚨</i> Classroom Deadlines</div>
                
                <!-- Блок входа -->
                <div id="auth-block" style="text-align: center; padding: 60px 0;">
                    <div style="font-size: 5rem; margin-bottom: 20px;">🔓</div>
                    <p style="color:var(--text-dim); margin-bottom:30px;">Требуется доступ к Google Classroom</p>
                    <button class="btn-action" onclick="App.startAuth()">АВТОРИЗОВАТЬСЯ</button>
                </div>

                <!-- Список задач -->
                <div id="tasks-list"></div>

                <!-- Пустой экран -->
                <div id="tasks-empty" class="hidden" style="text-align:center; padding:80px 0; opacity:0.3;">
                    <div style="font-size:6rem;">✅</div>
                    <p style="font-weight:900; margin-top:10px;">ВСЕ ЧИСТО, MATB</p>
                </div>

                <!-- Кнопка выхода -->
                <button id="logout-btn" class="btn-action" style="display:none; background:rgba(239, 68, 68, 0.1); color:var(--danger); margin-top:40px; border:1px solid var(--danger);" onclick="App.logout()">ВЫЙТИ ИЗ СИСТЕМЫ</button>
            </div>
        </div>

    </div>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="task-modal">
        <div class="modal-content">
            <div id="modal-subject" style="color:var(--accent-green); font-weight:900; letter-spacing:1px; margin-bottom:5px;">ПРЕДМЕТ</div>
            <h2 id="modal-title" style="margin-bottom:20px; font-size:1.8rem;">Заголовок работы</h2>
            <div id="modal-desc" style="text-align:left; color:var(--text-dim); margin-bottom:30px; line-height:1.6; max-height:200px; overflow-y:auto;">Детали задания...</div>
            <button class="btn-action" id="modal-btn">ПЕРЕЙТИ К ЗАДАНИЮ</button>
            <p onclick="App.closeModal()" style="margin-top:25px; cursor:pointer; font-weight:900; opacity:0.6;">ЗАКРЫТЬ</p>
        </div>
    </div>

    <!-- НАВИГАЦИОННАЯ ПАНЕЛЬ -->
    <nav class="nav-bar">
        <div class="nav-item active" id="nav-home" onclick="App.switchPage('home')">
            <i>🏠</i><span>База</span>
        </div>
        <div class="nav-item" id="nav-tasks" onclick="App.switchPage('tasks')">
            <i>📚</i><span>Задачи</span>
        </div>
    </nav>

    <script>
        /**
         * STUDY HUB CORE ENGINE v3.6
         * Разработано специально для MATB.
         * Содержит полную логику управления временем, расписанием и интеграцией с API.
         */

        const CLIENT_ID = '747337328453-pp0c1ncoagvotsjrephg9vlbf300ko90.apps.googleusercontent.com';
        
        // Массив временных интервалов уроков (40 мин урок + перемены)
        const LESSON_TIMES = [
            { start: "09:00", end: "09:40" }, // 1
            { start: "09:50", end: "10:30" }, // 2
            { start: "10:50", end: "11:30" }, // 3
            { start: "11:50", end: "12:30" }, // 4
            { start: "12:40", end: "13:20" }, // 5
            { start: "13:30", end: "14:10" }, // 6
            { start: "14:20", end: "15:00" }, // 7
            { start: "15:10", end: "15:50" }  // 8
        ];

        // План на неделю
        const WEEKLY_PLAN = {
            1: ["Алгебра", "География", "Укр. язык", "Биология", "Укр. язык", "Химия", "Информатика"],
            2: ["Геометрия", "Физика", "Укр. язык", "Биология", "Музыка", "Физкультура", "Гром. освіта", "Английский (16:00)"],
            3: ["Химия", "Основы здоровья", "Укр. литература", "Алгебра", "История Украины", "Английский", "География", "Биология"],
            4: ["Математика Доп (9:00)", "Физика", "Физкультура", "Всемирная история", "Технологии", "Английский"],
            5: ["Физкультура", "Укр. язык", "Укр. литература", "Алгебра", "Зарубежка", "Информатика", "Немецкий"]
        };

        const App = {
            tasksFound: 0,
            currentLessonIdx: -1,
            isAuthRunning: false,

            init() {
                console.log("App initialized. Welcome back, MATB.");
                this.updateTime();
                
                // Главный цикл обновлений (раз в секунду)
                setInterval(() => {
                    this.updateTime();
                    this.logicEngine();
                }, 1000);

                this.spawnPetals();
                this.renderSchedule();
                this.checkAlerts();

                // Авто-логин при наличии токена
                const savedToken = localStorage.getItem('g_token_v3');
                if (savedToken) {
                    this.loadClassroomData(savedToken);
                }
            },

            // Обновление текущих часов и даты
            updateTime() {
                const now = new Date();
                const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const dateStr = now.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
                
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('date-display').innerText = dateStr;
            },

            /**
             * ГЛАВНЫЙ ЛОГИЧЕСКИЙ ДВИЖОК
             * Обрабатывает уроки, перемены и таймеры
             */
            logicEngine() {
                const now = new Date();
                const currentTotalMin = now.getHours() * 60 + now.getMinutes();
                const currentSec = now.getSeconds();
                
                let activeLessonIdx = -1;
                let targetTimeMin = -1;
                let mode = "NONE"; // NONE, LESSON, BREAK

                // 1. Ищем, идет ли сейчас какой-то урок
                LESSON_TIMES.forEach((slot, i) => {
                    const start = this.toMin(slot.start);
                    const end = this.toMin(slot.end);

                    if (currentTotalMin >= start && currentTotalMin < end) {
                        activeLessonIdx = i;
                        targetTimeMin = end;
                        mode = "LESSON";
                    }
                });

                // 2. Если не урок, ищем, не перемена ли это сейчас
                if (mode === "NONE") {
                    for (let i = 0; i < LESSON_TIMES.length - 1; i++) {
                        const breakStart = this.toMin(LESSON_TIMES[i].end);
                        const breakEnd = this.toMin(LESSON_TIMES[i+1].start);

                        if (currentTotalMin >= breakStart && currentTotalMin < breakEnd) {
                            mode = "BREAK";
                            targetTimeMin = breakEnd;
                            break;
                        }
                    }
                }

                // 3. Если все еще ничего, проверяем до начала первого урока
                if (mode === "NONE" && currentTotalMin < this.toMin(LESSON_TIMES[0].start)) {
                    mode = "WAIT";
                    targetTimeMin = this.toMin(LESSON_TIMES[0].start);
                }

                this.updateUIStatus(mode, activeLessonIdx, targetTimeMin, currentTotalMin, currentSec);
            },

            // Вспомогательная функция перевода времени в минуты
            toMin(str) {
                const [h, m] = str.split(':').map(Number);
                return h * 60 + m;
            },

            /**
             * Обновление визуального статуса и таймеров
             */
            updateUIStatus(mode, lessonIdx, targetMin, currentMin, currentSec) {
                const label = document.getElementById('timer-label');
                const val = document.getElementById('timer-value');
                const statLesson = document.getElementById('stat-lesson');

                if (mode === "LESSON") {
                    label.innerText = "Урок закончится через:";
                    val.innerText = this.formatTime(targetMin, currentMin, currentSec);
                    statLesson.innerText = lessonIdx + 1;
                    statLesson.classList.add('text-neon');
                } 
                else if (mode === "BREAK") {
                    label.innerText = "Перемена закончится через:";
                    val.innerText = this.formatTime(targetMin, currentMin, currentSec);
                    statLesson.innerText = "ПЕРЕМЕНА";
                    statLesson.classList.remove('text-neon');
                } 
                else if (mode === "WAIT") {
                    label.innerText = "До начала уроков:";
                    val.innerText = this.formatTime(targetMin, currentMin, currentSec);
                    statLesson.innerText = "ОЖИДАНИЕ";
                }
                else {
                    label.innerText = "Уроки завершены";
                    val.innerText = "00:00";
                    statLesson.innerText = "ОТДЫХ";
                    statLesson.classList.remove('text-neon');
                }

                // Подсвечиваем урок в общем списке, если индекс изменился
                if (this.currentLessonIdx !== lessonIdx) {
                    this.currentLessonIdx = lessonIdx;
                    this.updateScheduleHighlight();
                }
            },

            // Форматирование времени до события
            formatTime(target, current, sec) {
                const diffMin = target - current - 1;
                const diffSec = 60 - sec;
                
                const mm = diffMin < 10 ? `0${diffMin}` : diffMin;
                const ss = diffSec < 10 ? `0${diffSec === 60 ? '00' : diffSec}` : (diffSec === 60 ? '00' : diffSec);
                
                return `${mm}:${ss}`;
            },

            updateScheduleHighlight() {
                const items = document.querySelectorAll('.schedule-item');
                items.forEach((item, idx) => {
                    item.classList.toggle('active-lesson', idx === this.currentLessonIdx);
                });
            },

            // Генерация списка уроков
            renderSchedule() {
                const day = new Date().getDay();
                const container = document.getElementById('schedule-container');
                
                // Проверка на выходные
                if (day === 0 || day === 6) {
                    container.innerHTML = `<div style="text-align:center; padding:30px; opacity:0.5; font-style:italic;">Свободный день. Отдыхай, MATB.</div>`;
                    return;
                }

                const lessons = WEEKLY_PLAN[day] || [];
                container.innerHTML = lessons.map((name, i) => {
                    const time = LESSON_TIMES[i] ? LESSON_TIMES[i].start : "--:--";
                    return `
                        <div class="schedule-item">
                            <span class="lesson-name">${name}</span>
                            <span class="lesson-time">${time}</span>
                        </div>
                    `;
                }).join('');
            },

            // Красивые лепестки сакуры
            spawnPetals() {
                const container = document.getElementById('fx-canvas');
                for (let i = 0; i < 40; i++) {
                    const petal = document.createElement('div');
                    petal.className = 'petal';
                    petal.style.left = Math.random() * 100 + 'vw';
                    petal.style.width = (Math.random() * 8 + 6) + 'px';
                    petal.style.height = (Math.random() * 12 + 8) + 'px';
                    petal.style.animationDuration = (Math.random() * 12 + 8) + 's';
                    petal.style.animationDelay = (Math.random() * 10) + 's';
                    container.appendChild(petal);
                }
            },

            // Проверка особых уведомлений
            checkAlerts() {
                const day = new Date().getDay();
                const alertText = document.getElementById('alert-text');
                
                if (day === 2) alertText.innerHTML = "СЕГОДНЯ <span class='text-neon'>АНГЛИЙСКИЙ</span> В 16:00";
                else if (day === 4) alertText.innerHTML = "СЕГОДНЯ <span class='text-neon'>МАТЕМАТИКА</span> В 9:00";
                else {
                    alertText.innerText = this.tasksFound > 0 ? `ОБНАРУЖЕНО ЗАДАНИЙ: ${this.tasksFound}` : "СИСТЕМА ЧИСТА (ДОЛГОВ НЕТ)";
                }
            },

            switchPage(target) {
                document.getElementById('page-home').classList.toggle('hidden', target !== 'home');
                document.getElementById('page-tasks').classList.toggle('hidden', target !== 'tasks');
                document.getElementById('nav-home').classList.toggle('active', target === 'home');
                document.getElementById('nav-tasks').classList.toggle('active', target === 'tasks');
                window.scrollTo(0,0);
            },

            /**
             * CLASSROOM API INTEGRATION
             */
            async loadClassroomData(token) {
                const list = document.getElementById('tasks-list');
                const authBlock = document.getElementById('auth-block');
                const logoutBtn = document.getElementById('logout-btn');
                
                list.innerHTML = `<div class="loader"></div><p style="text-align:center; opacity:0.5;">Сканирование курсов...</p>`;
                authBlock.style.display = 'none';
                logoutBtn.style.display = 'block';

                try {
                    const res = await fetch('https://classroom.googleapis.com/v1/courses', {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    const data = await res.json();
                    
                    if (!data.courses) throw new Error("No courses found");

                    const activeCourses = data.courses.filter(c => c.courseState === 'ACTIVE');
                    list.innerHTML = "";
                    this.tasksFound = 0;

                    // Фильтруем только нужные MATB предметы
                    for (let course of activeCourses) {
                        const name = course.name.toLowerCase();
                        const filter = ['биол', 'физи', 'хими', 'алгебр', 'геом', 'матем'];
                        if (!filter.some(k => name.includes(k))) continue;

                        const cwRes = await fetch(`https://classroom.googleapis.com/v1/courses/${course.id}/courseWork`, {
                            headers: { Authorization: `Bearer ${token}` }
                        });
                        const cwData = await cwRes.json();
                        
                        if (cwData.courseWork) {
                            for (let work of cwData.courseWork) {
                                // Проверяем статус сдачи
                                const sRes = await fetch(`https://classroom.googleapis.com/v1/courses/${course.id}/courseWork/${work.id}/studentSubmissions`, {
                                    headers: { Authorization: `Bearer ${token}` }
                                });
                                const sData = await sRes.json();
                                const submission = sData.studentSubmissions ? sData.studentSubmissions[0] : null;
                                
                                if (submission && submission.state !== 'TURNED_IN' && submission.state !== 'RETURNED') {
                                    this.tasksFound++;
                                    this.renderTaskCard(course.name, work);
                                }
                            }
                        }
                    }

                    document.getElementById('stat-tasks').innerText = this.tasksFound;
                    this.checkAlerts();
                    
                    if (this.tasksFound === 0) {
                        document.getElementById('tasks-empty').classList.remove('hidden');
                    } else {
                        document.getElementById('tasks-empty').classList.add('hidden');
                    }

                } catch (err) {
                    console.error("API Error:", err);
                    authBlock.style.display = 'block';
                    logoutBtn.style.display = 'none';
                    list.innerHTML = "";
                }
            },

            renderTaskCard(subject, work) {
                const card = document.createElement('div');
                card.className = 'task-card';
                card.innerHTML = `
                    <div style="font-size:0.8rem; font-weight:900; color:var(--accent-blue); text-transform:uppercase;">${subject}</div>
                    <h4 style="margin:8px 0;">${work.title}</h4>
                    <div style="font-size:0.9rem; opacity:0.7;">Дедлайн: ${work.dueDate ? `${work.dueDate.day}.${work.dueDate.month}` : 'Не указан'}</div>
                `;
                card.onclick = () => {
                    document.getElementById('modal-subject').innerText = subject;
                    document.getElementById('modal-title').innerText = work.title;
                    document.getElementById('modal-desc').innerText = work.description || "Инструкции отсутствуют.";
                    document.getElementById('modal-btn').onclick = () => window.open(work.alternateLink, '_blank');
                    document.getElementById('task-modal').style.display = 'flex';
                };
                document.getElementById('tasks-list').appendChild(card);
            },

            closeModal() {
                document.getElementById('task-modal').style.display = 'none';
            },

            startAuth() {
                if (this.isAuthRunning) return;
                this.isAuthRunning = true;

                const client = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/classroom.courses.readonly https://www.googleapis.com/auth/classroom.coursework.me.readonly',
                    callback: (response) => {
                        this.isAuthRunning = false;
                        if (response.access_token) {
                            localStorage.setItem('g_token_v3', response.access_token);
                            this.loadClassroomData(response.access_token);
                        }
                    }
                });
                client.requestAccessToken();
            },

            logout() {
                localStorage.removeItem('g_token_v3');
                location.reload();
            },

            triggerEasterEgg() {
                const clock = document.getElementById('time-display');
                clock.classList.add('text-neon');
                setTimeout(() => clock.classList.remove('text-neon'), 2000);
            }
        };

        // Запуск при полной загрузке
        window.onload = () => App.init();

    </script>
</body>
</html>
