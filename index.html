<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyHub Ultimate</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --success: #22c55e; --warning: #fbbf24; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; border-top: 2px solid var(--accent); z-index: 1000; }
        .nav-btn { flex: 1; padding: 15px 5px; text-align: center; cursor: pointer; font-weight: bold; color: #94a3b8; border: none; background: none; font-size: 0.75rem; transition: 0.3s; }
        .nav-btn.active { color: var(--accent); background: rgba(56, 189, 248, 0.1); }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }

        .card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #334155; margin-bottom: 15px; position: relative; }
        .deadline-alert { border-left: 5px solid var(--warning); }
        .status-tag { font-size: 0.7rem; padding: 3px 8px; border-radius: 10px; float: right; font-weight: bold; }
        
        .btn-main { background: var(--accent); color: #0f172a; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .input-box { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--accent); background: #0f172a; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div id="p-sched" class="page active">
        <h1 style="color: var(--accent)">📅 Сегодня</h1>
        <div id="clock" style="font-weight: bold; margin-bottom: 15px;"></div>
        <div id="schedule-box"></div>
    </div>

    <div id="p-cards" class="page">
        <h1 style="color: var(--accent)">🎯 Квесты</h1>
        <div class="card">
            <div id="q-text" style="font-size: 1.1rem; margin-bottom: 15px;">Нажми, чтобы начать</div>
            <input type="text" id="ans-input" class="input-box" style="display:none">
            <button id="card-btn" onclick="nextCard()" class="btn-main">Взять карточку</button>
            <p id="msg" style="margin-top: 10px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="p-google" class="page">
        <h1 style="color: var(--accent)">🏫 Classroom</h1>
        <p style="font-size: 0.8rem; opacity: 0.7;">(Синхронизация в процессе...)</p>
        
        <div id="google-tasks">
            <div class="card deadline-alert">
                <span class="status-tag" style="background: var(--warning); color: #000;">2 ЧАСА!</span>
                <div style="font-weight: bold;">Алгебра: Тест №4</div>
                <div style="font-size: 0.8rem; opacity: 0.6;">Сдать до: Сегодня 20:00</div>
            </div>

            <div class="card">
                <span class="status-tag" style="background: var(--success); color: #fff;">СДАНО</span>
                <div style="font-weight: bold; opacity: 0.5;">Физика: Лабораторная</div>
                <div style="font-size: 0.8rem; opacity: 0.4;">Проверено ИИ</div>
            </div>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-btn active" onclick="tab('p-sched', this)">УРОКИ</button>
    <button class="nav-btn" onclick="tab('p-cards', this)">КВЕСТЫ</button>
    <button class="nav-btn" onclick="tab('p-google', this)">CLASSROOM</button>
</nav>

<script>
    // Весь твой предыдущий JavaScript (Расписание и Карточки)
    const schedule = {
        1: ["Алгебра", "География", "Укр. язык", "Биология", "Укр. язык", "Химия", "Информатика"],
        2: ["Англ", "Геометрия", "Физика", "Укр. язык", "Биология", "Музыка/Рис", "Физра", "Гром. освіта"],
        3: ["Химия", "Основы здоровья", "Укр. лит", "Алгебра", "История Укр", "Англ", "География", "Биология"],
        4: ["Геометрия", "Физика", "Физра", "Всемирка", "Технологии", "Англ"],
        5: ["Физра", "Укр. язык", "Укр. лит", "Алгебра", "Зарубежка", "Информатика", "Немецкий"]
    };

    function tab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function update() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
        
        const day = now.getDay();
        const min = now.getHours() * 60 + now.getMinutes();
        const box = document.getElementById('schedule-box');
        box.innerHTML = "";
        
        (schedule[day] || []).forEach((name, i) => {
            const start = 540 + (i * 35);
            const end = start + 25;
            const item = document.createElement('div');
            item.style.padding = "15px";
            item.style.borderBottom = "1px solid #334155";
            if (min >= start && min < end) {
                item.style.borderLeft = "5px solid var(--accent)";
                item.style.background = "rgba(56, 189, 248, 0.1)";
            }
            item.innerHTML = `<span>${name}</span> <span style="float:right">${Math.floor(start/60)}:${(start%60).toString().padStart(2,'0')}</span>`;
            box.appendChild(item);
        });
    }

    setInterval(update, 1000);
    update();

    // Карточки (оставляем твою логику)
    function nextCard() {
        // Тут код из предыдущего ответа
        alert("Вкладка работает! Карточки подгружаются...");
    }
</script>
</body>
</html>
