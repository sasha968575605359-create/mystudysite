<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY HUB: MATB OS v3.0</title>
    <!-- Google Identity Services for Classroom API -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* CSS VARIABLES - Premium Dark Theme */
        :root {
            --bg-color: #022c22;
            --accent-color: #4ade80;
            --accent-glow: rgba(74, 222, 128, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --card-bg: rgba(15, 23, 42, 0.9);
            --danger: #ef4444;
            --warning: #f59e0b;
            --purple-ai: #a855f7;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* RESET & BASE STYLES */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* BACKGROUND EFFECTS (SAKURA) */
        #fx-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .petal {
            position: absolute;
            background: #ffb7c5;
            border-radius: 150% 0 150% 0;
            opacity: 0.6;
            pointer-events: none;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* LAYOUT */
        .app-container {
            max-width: 650px;
            margin: 0 auto;
            padding: 20px 20px 110px;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        /* CLOCK & DATE */
        .hero-section {
            text-align: center;
            padding: 30px 0;
        }
        #main-clock {
            font-size: 5rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -4px;
            color: var(--accent-color);
            text-shadow: 0 0 20px var(--accent-glow);
        }
        #current-date {
            font-size: 1.2rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 5px;
            font-weight: 600;
        }

        /* ACTION BUTTONS */
        .btn {
            border: none;
            padding: 20px;
            border-radius: 24px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-primary {
            background: var(--accent-color);
            color: #022c22;
            box-shadow: 0 8px 25px rgba(74, 222, 128, 0.3);
        }
        .btn-ai {
            background: linear-gradient(135deg, #8b5cf6, #d946ef);
            color: white;
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.3);
        }
        .btn:active { transform: scale(0.96); }

        /* SCHEDULE LISTING */
        .schedule-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .schedule-item {
            background: rgba(255, 255, 255, 0.04);
            margin-top: 12px;
            padding: 20px;
            border-radius: 22px;
            border-left: 6px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .lesson-name { font-weight: 700; font-size: 1.05rem; }
        .lesson-time {
            font-family: 'Courier New', monospace;
            color: var(--accent-color);
            font-weight: 900;
            font-size: 1.1rem;
            background: rgba(0,0,0,0.2);
            padding: 4px 10px;
            border-radius: 8px;
        }

        /* TASKS SYSTEM */
        .task-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 22px;
            margin-top: 18px;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
        }
        .task-card:hover { border-color: var(--accent-color); background: rgba(255,255,255,0.08); }
        .task-badge {
            font-size: 0.7rem;
            background: var(--accent-color);
            color: #000;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 900;
            display: inline-block;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .task-course-name { color: var(--text-secondary); font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
        .task-main-title { font-size: 1.2rem; font-weight: 700; color: #fff; }

        /* FULLSCREEN MODAL */
        #task-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 10, 8, 0.98);
            z-index: 3000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        #task-modal.active { display: flex; animation: zoomFade 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes zoomFade { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

        .modal-inner {
            width: 100%;
            max-width: 500px;
            background: #0f172a;
            border-radius: 45px;
            padding: 40px 30px;
            border: 2px solid var(--accent-color);
            position: relative;
            text-align: center;
        }
        .close-modal-btn {
            position: absolute;
            top: -70px;
            right: 0;
            font-size: 4rem;
            color: #fff;
            cursor: pointer;
            line-height: 1;
        }
        .modal-timer-box {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid var(--danger);
            border-radius: 28px;
            padding: 25px;
            margin: 25px 0;
        }
        .timer-val { font-size: 2.2rem; font-weight: 900; color: var(--danger); display: block; }
        .modal-description {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 35px;
            max-height: 180px;
            overflow-y: auto;
            text-align: left;
            padding: 0 10px;
        }

        /* NAVIGATION BAR */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 95px;
            background: rgba(2, 44, 34, 0.96);
            backdrop-filter: blur(15px);
            display: flex;
            border-top: 1px solid var(--glass-border);
            z-index: 2000;
        }
        .nav-link {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #64748b;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .nav-link.active { color: var(--accent-color); }
        .nav-link i { font-size: 1.8rem; margin-bottom: 6px; font-style: normal; }

        /* UTILS */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #ai-response-box {
            display: none;
            margin-top: 15px;
            padding: 20px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid var(--purple-ai);
            border-radius: 20px;
            font-weight: 500;
        }
        .loader { text-align: center; padding: 40px; }
    </style>
</head>
<body>

    <div id="fx-canvas"></div>

    <!-- TASK VIEW MODAL -->
    <div id="task-modal">
        <div class="modal-inner">
            <div class="close-modal-btn" onclick="App.closeTaskDetails()">×</div>
            <div id="modal-course-tag" style="color: var(--accent-color); font-weight: 800; text-transform: uppercase; font-size: 0.8rem;">Предмет</div>
            <h2 id="modal-task-title" style="margin: 10px 0 20px; font-size: 1.8rem; color: #fff;">Название</h2>
            
            <div class="modal-timer-box">
                <span style="font-size: 0.8rem; opacity: 0.7; font-weight: 700; color: #fff;">ДО ДЕДЛАЙНА ОСТАЛОСЬ:</span>
                <span id="modal-timer-text" class="timer-val">--д --ч --м</span>
            </div>

            <div id="modal-description-text" class="modal-description">Описание задания загружается...</div>
            
            <button id="modal-go-link" class="btn btn-primary">ОТКРЫТЬ В КЛАССУМЕ ➔</button>
        </div>
    </div>

    <div class="app-container">
        
        <!-- PAGE: HOME -->
        <div id="view-home" class="page active">
            <div class="hero-section">
                <h1 id="main-clock">00:00</h1>
                <div id="current-date">Загрузка...</div>
            </div>

            <div class="glass-panel">
                <div class="schedule-title">
                    <span style="font-size: 1.5rem;">🤖</span>
                    <h3 style="margin: 0;">ИИ СОВЕТНИК</h3>
                </div>
                <button class="btn btn-ai" onclick="App.triggerAiMoment()">МНЕ ОЧЕНЬ СКУЧНО</button>
                <div id="ai-response-box"></div>
            </div>

            <div class="glass-panel">
                <div class="schedule-title">
                    <span style="font-size: 1.5rem;">📅</span>
                    <h3 style="margin: 0;">УРОКИ НА СЕГОДНЯ</h3>
                </div>
                <div id="lessons-list">
                    <!-- Dynamic Content -->
                </div>
            </div>
        </div>

        <!-- PAGE: TASKS -->
        <div id="view-tasks" class="page">
            <div class="glass-panel">
                <h2 style="text-align: center; margin-top: 0; color: var(--accent-color);">🚨 ФИЛЬТР ЗАДАНИЙ</h2>
                <p style="text-align: center; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 25px;">
                    Ищу только Контрольные, Номера и Файлы по Физике, Химии и Биологии.
                </p>

                <div id="login-zone" style="text-align: center;">
                    <button class="btn btn-primary" onclick="App.handleGoogleAuth()">СИНХРОНИЗИРОВАТЬ CLASSROOM</button>
                </div>

                <div id="tasks-feed">
                    <!-- Tasks injected here -->
                </div>

                <button id="btn-logout" class="btn" style="display:none; background:rgba(239, 68, 68, 0.15); color: #ef4444; margin-top: 30px; border: 1px solid rgba(239, 68, 68, 0.3);" onclick="App.performLogout()">СБРОСИТЬ АККАУНТ</button>
            </div>
        </div>

    </div>

    <!-- GLOBAL NAV -->
    <nav class="bottom-nav">
        <div class="nav-link active" onclick="App.navigateTo('view-home', this)">
            <i>🏠</i>
            <span>Главная</span>
        </div>
        <div class="nav-link" onclick="App.navigateTo('view-tasks', this)">
            <i>📚</i>
            <span>Задания</span>
        </div>
    </nav>

    <script>
        /**
         * STUDY HUB OS - Core Logic
         * Designed for MATB
         */
        
        const CLASSROOM_CLIENT_ID = '747337328453-pp0c1ncoagvotsjrephg9vlbf300ko90.apps.googleusercontent.com';
        
        // Schedule Grid (Standard 25m lessons)
        const TIMES = ["09:00", "09:35", "10:10", "10:45", "11:20", "11:55", "12:30", "13:05"];

        const FULL_SCHEDULE = {
            1: ["Алгебра", "География", "Укр. язык", "Биология", "Укр. язык", "Химия", "Информатика"],
            2: ["Английский (Доп 16:00)", "Геометрия", "Физика", "Укр. язык", "Биология", "Музыка/Рис.", "Физра", "Гром. освіта"],
            3: ["Химия", "Основы здоровья", "Укр. литература", "Алгебра", "История Украины", "Английский", "География", "Биология"],
            4: ["Математика Доп (9:00)", "Физика", "Физра", "Всемирная история", "Технологии", "Английский"],
            5: ["Физра", "Укр. язык", "Укр. литература", "Алгебра", "Зарубежка", "Информатика", "Немецкий"]
        };

        const App = {
            timerRef: null,
            
            init() {
                this.updateLiveClock();
                setInterval(() => this.updateLiveClock(), 1000);
                this.generatePetals();
                this.drawSchedule();
                
                // Auto-login if token exists
                const existingToken = localStorage.getItem('google_token');
                if (existingToken) {
                    this.fetchClassroomContent(existingToken);
                }
            },

            updateLiveClock() {
                const now = new Date();
                const clockEl = document.getElementById('main-clock');
                const dateEl = document.getElementById('current-date');
                
                clockEl.innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                dateEl.innerText = now.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
            },

            navigateTo(pageId, navEl) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
                document.getElementById(pageId).classList.add('active');
                navEl.classList.add('active');
            },

            generatePetals() {
                const layer = document.getElementById('fx-canvas');
                for(let i=0; i<25; i++) {
                    let petal = document.createElement('div');
                    petal.className = 'petal';
                    const size = Math.random() * 10 + 5;
                    petal.style.width = size + 'px';
                    petal.style.height = (size * 1.4) + 'px';
                    petal.style.left = Math.random() * 100 + 'vw';
                    petal.style.animationDuration = (Math.random() * 6 + 6) + 's';
                    petal.style.animationDelay = (Math.random() * 8) + 's';
                    layer.appendChild(petal);
                }
            },

            drawSchedule() {
                const dayOfWeek = new Date().getDay();
                const list = document.getElementById('lessons-list');
                
                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    list.innerHTML = "<div style='text-align:center; padding:30px; opacity:0.4;'>Сегодня чилл, MATB. Выходной! 🍕</div>";
                    return;
                }

                const todayLessons = FULL_SCHEDULE[dayOfWeek] || [];
                let output = "";
                
                todayLessons.forEach((name, i) => {
                    let timeText = TIMES[i] || "--:--";
                    
                    // Specific overrides for MATB
                    if (dayOfWeek === 2 && i === 0) timeText = "16:00";
                    if (dayOfWeek === 4 && i === 0) timeText = "09:00";

                    output += `
                        <div class="schedule-item">
                            <span class="lesson-name">${name}</span>
                            <span class="lesson-time">${timeText}</span>
                        </div>
                    `;
                });
                list.innerHTML = output;
            },

            triggerAiMoment() {
                const jokes = [
                    "Посмотри на учителя и представь, что он — покемон. Какая у него стихия?",
                    "Придумай 5 способов использовать учебник биологии вместо кирпича.",
                    "Напиши в углу тетради: 'Здесь был MATB' и обведи это в сердечко.",
                    "Попробуй моргать в такт тому, как учитель говорит 'Так вот'.",
                    "Нарисуй схему того, как бы ты захватил школу с помощью армии котов."
                ];
                const box = document.getElementById('ai-response-box');
                box.style.display = 'block';
                box.innerHTML = `<strong>ЗАДАНИЕ:</strong><br>${jokes[Math.floor(Math.random() * jokes.length)]}`;
            },

            handleGoogleAuth() {
                const client = google.accounts.oauth2.initTokenClient({
                    client_id: CLASSROOM_CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/classroom.courses.readonly https://www.googleapis.com/auth/classroom.coursework.me.readonly',
                    callback: (response) => {
                        if (response.access_token) {
                            localStorage.setItem('google_token', response.access_token);
                            this.fetchClassroomContent(response.access_token);
                        }
                    }
                });
                client.requestAccessToken();
            },

            async fetchClassroomContent(token) {
                const feed = document.getElementById('tasks-feed');
                const loginZone = document.getElementById('login-zone');
                const logoutBtn = document.getElementById('btn-logout');

                feed.innerHTML = "<div class='loader'>🔍 ИИ анализирует файлы и ключевые слова... Подожди...</div>";
                loginZone.style.display = 'none';
                logoutBtn.style.display = 'block';

                try {
                    const coursesResponse = await fetch('https://classroom.googleapis.com/v1/courses', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const coursesData = await coursesResponse.json();
                    
                    if (coursesData.error) throw new Error("Auth Expired");

                    const activeCourses = coursesData.courses ? coursesData.courses.filter(c => c.courseState === 'ACTIVE') : [];
                    let hasTasks = false;
                    feed.innerHTML = "";

                    for (let course of activeCourses) {
                        const lowName = course.name.toLowerCase();
                        
                        // SUBJECT FILTERS (MATB'S SPECIFIC REQUEST)
                        const isPhysics = lowName.includes('физи') || lowName.includes('фізи');
                        const isChem = lowName.includes('хими') || lowName.includes('хімі');
                        const isBio = lowName.includes('биол') || lowName.includes('біол');

                        if (!isPhysics && !isChem && !isBio) continue;

                        const cwResponse = await fetch(`https://classroom.googleapis.com/v1/courses/${course.id}/courseWork`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        const cwData = await cwResponse.json();
                        
                        if (cwData.courseWork) {
                            for (let work of cwData.courseWork) {
                                // 1. CHECK IF ALREADY SUBMITTED
                                const subResponse = await fetch(`https://classroom.googleapis.com/v1/courses/${course.id}/courseWork/${work.id}/studentSubmissions`, {
                                    headers: { 'Authorization': `Bearer ${token}` }
                                });
                                const subData = await subResponse.json();
                                const subState = subData.studentSubmissions ? subData.studentSubmissions[0].state : 'NEW';

                                if (subState === 'TURNED_IN' || subState === 'RETURNED') continue;

                                // 2. DATE FILTER (Don't show expired)
                                let dueDate = null;
                                if (work.dueDate) {
                                    dueDate = new Date(work.dueDate.year, work.dueDate.month - 1, work.dueDate.day);
                                    if (work.dueTime) {
                                        dueDate.setHours(work.dueTime.hours || 23, work.dueTime.minutes || 59);
                                    } else {
                                        dueDate.setHours(23, 59);
                                    }
                                    if (dueDate < new Date()) continue; // Expired
                                }

                                // 3. CONTENT FILTER (Keywords or Files)
                                const workTitle = work.title.toLowerCase();
                                const workDesc = (work.description || "").toLowerCase();
                                const hasAttachments = work.materials && work.materials.length > 0;

                                // Patterns for "numbers", "control work", "pages"
                                const patterns = ["№", "номер", "задан", "стр", "стор", "кр", "контр", "тест", "лаб"];
                                const matchKeyword = patterns.some(p => workTitle.includes(p) || workDesc.includes(p));

                                // Only show if it's a specific task or has a file
                                if (matchKeyword || hasAttachments) {
                                    hasTasks = true;
                                    this.createTaskUI(course.name, work, dueDate);
                                }
                            }
                        }
                    }

                    if (!hasTasks) {
                        feed.innerHTML = "<div style='text-align:center; padding:50px; opacity:0.5;'>Умный фильтр ничего не нашел. Твоя совесть чиста! 🌸</div>";
                    }

                } catch (err) {
                    console.error(err);
                    localStorage.removeItem('google_token');
                    loginZone.style.display = 'block';
                    logoutBtn.style.display = 'none';
                    feed.innerHTML = "<p style='color:var(--danger); text-align:center;'>Сессия истекла. Перезайди!</p>";
                }
            },

            createTaskUI(courseName, work, deadline) {
                const container = document.getElementById('tasks-feed');
                const card = document.createElement('div');
                card.className = 'task-card';
                card.innerHTML = `
                    <div class="task-badge">Важно</div>
                    <div class="task-course-name">${courseName}</div>
                    <div class="task-main-title">${work.title}</div>
                `;
                card.onclick = () => this.showTaskDetails(courseName, work, deadline);
                container.appendChild(card);
            },

            showTaskDetails(course, work, deadline) {
                const modal = document.getElementById('task-modal');
                document.getElementById('modal-course-tag').innerText = course;
                document.getElementById('modal-task-title').innerText = work.title;
                document.getElementById('modal-description-text').innerText = work.description || "В этом задании нет текста, скорее всего работа внутри прикрепленного файла в Классруме.";
                document.getElementById('modal-go-link').onclick = () => window.open(work.alternateLink, '_blank');

                if (deadline) {
                    this.refreshModalTimer(deadline);
                    if (this.timerRef) clearInterval(this.timerRef);
                    this.timerRef = setInterval(() => this.refreshModalTimer(deadline), 60000);
                } else {
                    document.getElementById('modal-timer-text').innerText = "БЕЗ СРОКА";
                }

                modal.classList.add('active');
            },

            refreshModalTimer(deadline) {
                const now = new Date();
                const diff = deadline - now;
                const timerEl = document.getElementById('modal-timer-text');

                if (diff <= 0) {
                    timerEl.innerText = "СРОК ВЫШЕЛ";
                    return;
                }

                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

                timerEl.innerText = `${d}д ${h}ч ${m}м`;
            },

            closeTaskDetails() {
                document.getElementById('task-modal').classList.remove('active');
                if (this.timerRef) clearInterval(this.timerRef);
            },

            performLogout() {
                localStorage.removeItem('google_token');
                location.reload();
            }
        };

        // Fire it up
        window.onload = () => App.init();
