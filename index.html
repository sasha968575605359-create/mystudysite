<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY HUB: MATB OS v4.5 ULTIMATE NOTIFICATION EDITION</title>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* PREMIUM DESIGN SYSTEM - MATB SPECIAL EDITION 
           Максимально детальный CSS для создания эффекта погружения.
        */
        :root {
            --bg-deep: #06101a;
            --card-dark: #0d1a2b;
            --accent-green: #4ade80;
            --accent-blue: #3b82f6;
            --accent-pink: #f472b6;
            --accent-orange: #f59e0b;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --shadow-neo: 6px 6px 0px #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --glow-green: 0 0 25px rgba(74, 222, 128, 0.4);
            --glow-blue: 0 0 25px rgba(59, 130, 246, 0.4);
            --glow-pink: 0 0 25px rgba(244, 114, 182, 0.4);
        }

        /* Системные сбросы */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(244, 114, 182, 0.05) 0%, transparent 40%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3BaseFilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            background-attachment: fixed;
        }

        /* SAKURA ENGINE v2.0 */
        #fx-canvas {
            position: fixed;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .petal {
            position: absolute;
            background: linear-gradient(135deg, #ffb7c5, #f472b6);
            border-radius: 150% 0 150% 0;
            opacity: 0.3;
            filter: blur(0.5px);
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); }
            100% { transform: translateY(115vh) rotate(720deg) translateX(100px); }
        }

        /* Контейнер приложения */
        .app-container {
            max-width: 550px;
            margin: 0 auto;
            padding: 20px 20px 140px;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        /* Часы */
        .clock-card {
            background: var(--card-dark);
            border-radius: 45px;
            padding: 50px 20px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
            overflow: hidden;
        }
        .clock-time {
            font-size: 6.5rem;
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -5px;
            font-variant-numeric: tabular-nums;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .clock-date {
            color: var(--text-dim);
            font-size: 1.2rem;
            margin-top: 10px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* Кнопка уведомлений */
        .notif-bar {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }
        .notif-info h4 { font-size: 0.9rem; font-weight: 900; }
        .notif-info p { font-size: 0.7rem; color: var(--text-dim); }
        
        .btn-notif {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }
        .btn-notif.active {
            background: var(--accent-green);
            box-shadow: 0 5px 15px rgba(74, 222, 128, 0.3);
        }

        /* Баннер статуса */
        .status-banner {
            border-radius: 35px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .status-banner.type-lesson { background: linear-gradient(135deg, #1e3a8a, #3b82f6); box-shadow: var(--glow-blue); }
        .status-banner.type-break { background: linear-gradient(135deg, #831843, #f472b6); box-shadow: var(--glow-pink); }
        .status-banner.type-wait { background: #1e293b; }

        .banner-label { font-size: 0.85rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.9; margin-bottom: 10px; }
        .banner-timer { font-size: 3.5rem; font-weight: 900; font-variant-numeric: tabular-nums; }

        /* Секции */
        .section-card {
            background: var(--card-dark);
            border-radius: 40px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.04);
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            font-size: 1.4rem;
            font-weight: 900;
        }

        /* Список расписания */
        .schedule-item {
            background: rgba(255,255,255,0.02);
            border-radius: 24px;
            padding: 20px 25px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s ease;
            border: 1px solid transparent;
        }
        
        .item-type-lesson { border-left: 6px solid var(--accent-blue); }
        .item-type-break { border-left: 6px solid var(--accent-pink); opacity: 0.7; font-size: 0.95rem; }

        .schedule-item.active {
            background: rgba(255,255,255,0.1);
            transform: scale(1.03);
            border-color: rgba(255,255,255,0.2);
        }
        .schedule-item.active.item-type-lesson { border-left-color: var(--accent-green); box-shadow: var(--glow-green); }
        .schedule-item.active.item-type-break { border-left-color: var(--accent-pink); box-shadow: var(--glow-pink); opacity: 1; }

        .item-info .name { font-weight: 800; font-size: 1.1rem; display: block; }
        .item-info .type-tag { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; color: var(--text-dim); }
        .item-time { font-weight: 900; font-size: 1rem; color: var(--text-dim); }
        .active .item-time { color: white; }

        /* Мониторинг / Статистика */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box { background: var(--glass); padding: 22px; border-radius: 28px; text-align: center; }
        .stat-label { font-size: 0.75rem; color: var(--text-dim); font-weight: 800; margin-bottom: 5px; }
        .stat-value { font-size: 1.8rem; font-weight: 900; }

        /* Задания / Classroom */
        .task-card {
            background: white;
            color: black;
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 15px;
            border: 4px solid #000;
            box-shadow: var(--shadow-neo);
            cursor: pointer;
            transition: 0.2s;
        }
        .task-card:active { transform: translate(3px, 3px); box-shadow: 3px 3px #000; }
        .task-subject { font-size: 0.75rem; font-weight: 900; color: var(--accent-blue); text-transform: uppercase; }
        .task-title { font-size: 1.2rem; font-weight: 900; margin: 5px 0; }

        /* Модалка */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 5000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(15px);
        }
        .modal-box {
            background: var(--card-dark);
            width: 100%;
            max-width: 450px;
            border-radius: 40px;
            padding: 40px;
            border: 2px solid var(--accent-blue);
            text-align: center;
        }

        /* Навигация */
        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(11, 21, 33, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            padding: 15px 0 35px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 2000;
        }
        .nav-item {
            flex: 1;
            text-align: center;
            color: var(--text-dim);
            font-weight: 900;
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .nav-item i { font-style: normal; font-size: 1.8rem; }
        .nav-item.active { color: var(--accent-green); }

        .hidden { display: none !important; }
        .loader { width: 40px; height: 40px; border: 4px solid var(--glass); border-top-color: var(--accent-green); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .btn-action {
            width: 100%;
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body>

    <div id="fx-canvas"></div>

    <div class="app-container">
        
        <!-- HEADER -->
        <div class="clock-card" onclick="App.easterEgg()">
            <div class="clock-time" id="clock-display">00:00</div>
            <div id="date-display" class="clock-date">ЗАГРУЗКА...</div>
        </div>

        <!-- NOTIFICATIONS TOGGLE -->
        <div class="notif-bar">
            <div class="notif-info">
                <h4>PUSH-УВЕДОМЛЕНИЯ</h4>
                <p id="notif-status">Нажми, чтобы не проспать звонок</p>
            </div>
            <button class="btn-notif" id="btn-notif" onclick="App.requestNotifications()">ВКЛ.УВЕДОМЛЕНИЯ</button>
        </div>

        <!-- MAIN PAGE -->
        <div id="view-home">
            <!-- CURRENT STATUS BANNER -->
            <div id="main-banner" class="status-banner type-wait">
                <div id="banner-label" class="banner-label">ОЖИДАНИЕ СТАРТА</div>
                <div id="banner-timer" class="banner-timer">00:00:00</div>
            </div>

            <!-- SCHEDULE SECTION -->
            <div class="section-card">
                <div class="section-header"><i>📅</i> РАСПИСАНИЕ (25/10)</div>
                <div id="schedule-list">
                    <!-- Будет заполнено скриптом -->
                </div>
            </div>

            <!-- MONITORING SECTION -->
            <div class="section-card">
                <div class="section-header"><i>📊</i> МОНИТОРИНГ</div>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">ЗАДАНИЙ</div>
                        <div id="stat-tasks" class="stat-value">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">УРОК №</div>
                        <div id="stat-lesson-num" class="stat-value">-</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- TASKS PAGE -->
        <div id="view-tasks" class="hidden">
            <div class="section-card" style="min-height: 500px;">
                <div class="section-header"><i>🚨</i> CLASSROOM</div>
                
                <div id="auth-section" style="text-align: center; padding: 40px 0;">
                    <div style="font-size: 4rem; margin-bottom: 20px;">🔓</div>
                    <p style="color:var(--text-dim); margin-bottom:25px;">Нужен доступ к Google API</p>
                    <button class="btn-action" onclick="App.handleAuth()">АВТОРИЗАЦИЯ</button>
                </div>

                <div id="tasks-container"></div>
                <div id="tasks-empty" class="hidden" style="text-align:center; padding:60px 0; opacity:0.3;">
                    <div style="font-size:5rem;">💎</div>
                    <p style="font-weight:900;">ДОЛГОВ НЕТ</p>
                </div>

                <button id="btn-logout" class="btn-action" style="display:none; background:transparent; border:1px solid var(--danger); color:var(--danger); margin-top:30px;" onclick="App.logout()">ВЫЙТИ</button>
            </div>
        </div>

    </div>

    <!-- MODAL -->
    <div id="modal-overlay" onclick="App.closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div id="m-subject" style="color:var(--accent-green); font-weight:900; font-size:0.8rem; margin-bottom:10px;">SUBJECT</div>
            <h2 id="m-title" style="margin-bottom:20px;">Task Title</h2>
            <div id="m-desc" style="text-align:left; color:var(--text-dim); font-size:0.9rem; line-height:1.6; margin-bottom:30px; max-height:200px; overflow-y:auto;">Description here...</div>
            <button class="btn-action" id="m-link">ОТКРЫТЬ В CLASSROOM</button>
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav class="nav-bar">
        <div class="nav-item active" id="nav-home" onclick="App.switchView('home')">
            <i>🏠</i><span>БАЗА</span>
        </div>
        <div class="nav-item" id="nav-tasks" onclick="App.switchView('tasks')">
            <i>📚</i><span>ЗАДАЧИ</span>
        </div>
        <div class="nav-item" onclick="App.easterEgg()">
            <i>⚙️</i><span>MATB OS</span>
        </div>
    </nav>

    <script>
        /**
         * MATB OS CORE ENGINE v4.5
         * Конфигурация: Урок 25 мин, Перемена 10 мин. Старт 09:00.
         */

        const CLIENT_ID = '747337328453-pp0c1ncoagvotsjrephg9vlbf300ko90.apps.googleusercontent.com';
        
        const TIMING = {
            lesson: 25,
            break: 10,
            start: "09:00",
            total: 8
        };

        const WEEKLY_PLAN = {
            1: ["Алгебра", "География", "Укр. язык", "Биология", "Укр. язык", "Химия", "Информатика"],
            2: ["Геометрия", "Физика", "Укр. язык", "Биология", "Музыка", "Физкультура", "Гром. освіта"],
            3: ["Химия", "Основы здоровья", "Укр. литература", "Алгебра", "История", "Английский", "География"],
            4: ["Математика Доп", "Физика", "Физкультура", "История", "Технологии", "Английский"],
            5: ["Физкультура", "Укр. язык", "Укр. литература", "Алгебра", "Зарубежка", "Информатика", "Немецкий"]
        };

        const App = {
            timeline: [],
            lastPush: "",
            isAuthReady: false,

            init() {
                this.buildTimeline();
                this.renderSchedule();
                this.spawnPetals();
                this.updateClock();
                
                // Проверка токена
                const token = localStorage.getItem('matb_token_v4');
                if (token) this.loadClassroom(token);

                // Главный цикл (1 сек)
                setInterval(() => {
                    this.updateClock();
                    this.engine();
                }, 1000);
                
                this.checkNotifStatus();
            },

            // Генерируем полную сетку дня
            buildTimeline() {
                const day = new Date().getDay();
                const subjects = WEEKLY_PLAN[day] || [];
                let current = this.toMin(TIMING.start);

                for (let i = 0; i < TIMING.total; i++) {
                    // УРОК
                    this.timeline.push({
                        type: 'lesson',
                        num: i + 1,
                        name: subjects[i] || `Урок ${i + 1}`,
                        start: current,
                        end: current + TIMING.lesson
                    });
                    current += TIMING.lesson;

                    // ПЕРЕМЕНА
                    if (i < TIMING.total - 1) {
                        this.timeline.push({
                            type: 'break',
                            num: i + 1,
                            name: `Перемена ${i + 1}`,
                            start: current,
                            end: current + TIMING.break
                        });
                        current += TIMING.break;
                    }
                }
            },

            toMin(s) { const [h, m] = s.split(':').map(Number); return h * 60 + m; },
            minToS(m) { return `${Math.floor(m/60).toString().padStart(2,'0')}:${(m%60).toString().padStart(2,'0')}`; },

            renderSchedule() {
                const list = document.getElementById('schedule-list');
                list.innerHTML = this.timeline.map((item, i) => `
                    <div class="schedule-item item-type-${item.type}" id="sched-${i}">
                        <div class="item-info">
                            <span class="type-tag">${item.type === 'lesson' ? 'Урок '+item.num : 'Перемена'}</span>
                            <span class="name">${item.name}</span>
                        </div>
                        <div class="item-time">${this.minToS(item.start)}</div>
                    </div>
                `).join('');
            },

            updateClock() {
                const now = new Date();
                document.getElementById('clock-display').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                document.getElementById('date-display').innerText = now.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
            },

            engine() {
                const now = new Date();
                const curMin = now.getHours() * 60 + now.getMinutes();
                const curSec = now.getSeconds();
                
                let activeItem = null;
                let nextItem = this.timeline.find(x => x.start > curMin);

                this.timeline.forEach((item, i) => {
                    const el = document.getElementById(`sched-${i}`);
                    if (curMin >= item.start && curMin < item.end) {
                        activeItem = item;
                        el.classList.add('active');
                        this.updateBanner(item, item.end - curMin - 1, 60 - curSec);
                        this.notify(item.name);
                    } else {
                        el.classList.remove('active');
                    }
                });

                if (!activeItem) {
                    if (nextItem) {
                        this.updateBanner({name: "Ожидание", type: "wait"}, nextItem.start - curMin - 1, 60 - curSec);
                        document.getElementById('stat-lesson-num').innerText = "-";
                    } else {
                        this.setBannerFinished();
                    }
                } else {
                    document.getElementById('stat-lesson-num').innerText = activeItem.type === 'lesson' ? activeItem.num : "П";
                }
            },

            updateBanner(item, m, s) {
                const b = document.getElementById('main-banner');
                const label = document.getElementById('banner-label');
                const timer = document.getElementById('banner-timer');

                b.className = `status-banner type-${item.type}`;
                label.innerText = item.type === 'lesson' ? `ТЕКУЩИЙ УРОК: ${item.name}` : 
                                 item.type === 'break' ? `ПЕРЕМЕНА: ${item.name}` : "ДО СЛЕДУЮЩЕГО ЭТАПА:";
                
                timer.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            },

            setBannerFinished() {
                const b = document.getElementById('main-banner');
                b.className = "status-banner type-wait";
                document.getElementById('banner-label').innerText = "УРОКИ ОКОНЧЕНЫ";
                document.getElementById('banner-timer').innerText = "СВОБОДА";
                document.getElementById('stat-lesson-num').innerText = "OFF";
            },

            // УВЕДОМЛЕНИЯ
            async requestNotifications() {
                const p = await Notification.requestPermission();
                if (p === 'granted') {
                    this.checkNotifStatus();
                    new Notification("MATB OS", { body: "Система оповещений активирована!" });
                }
            },

            checkNotifStatus() {
                const btn = document.getElementById('btn-notif');
                const status = document.getElementById('notif-status');
                if (Notification.permission === 'granted') {
                    btn.innerText = "АКТИВНО";
                    btn.classList.add('active');
                    status.innerText = "Буду присылать пуши при звонках";
                }
            },

            notify(title) {
                if (Notification.permission === 'granted' && this.lastPush !== title) {
                    this.lastPush = title;
                    new Notification("Смена этапа", { body: `Начинается: ${title}`, icon: "https://cdn-icons-png.flaticon.com/512/3557/3557635.png" });
                }
            },

            // CLASSROOM LOGIC
            handleAuth() {
                const client = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/classroom.courses.readonly https://www.googleapis.com/auth/classroom.coursework.me.readonly',
                    callback: (resp) => {
                        if (resp.access_token) {
                            localStorage.setItem('matb_token_v4', resp.access_token);
                            this.loadClassroom(resp.access_token);
                        }
                    }
                });
                client.requestAccessToken();
            },

            async loadClassroom(token) {
                const container = document.getElementById('tasks-container');
                const auth = document.getElementById('auth-section');
                const logout = document.getElementById('btn-logout');
                
                auth.style.display = 'none';
                logout.style.display = 'block';
                container.innerHTML = `<div class="loader"></div>`;

                try {
                    const cResp = await fetch('https://classroom.googleapis.com/v1/courses', { headers: { Authorization: `Bearer ${token}` }});
                    const cData = await cResp.json();
                    if (!cData.courses) throw "No courses";

                    container.innerHTML = "";
                    let count = 0;

                    for (let course of cData.courses) {
                        if (course.courseState !== 'ACTIVE') continue;
                        
                        const wResp = await fetch(`https://classroom.googleapis.com/v1/courses/${course.id}/courseWork`, { headers: { Authorization: `Bearer ${token}` }});
                        const wData = await wResp.json();
                        
                        if (wData.courseWork) {
                            for (let work of wData.courseWork) {
                                const sResp = await fetch(`https://classroom.googleapis.com/v1/courses/${course.id}/courseWork/${work.id}/studentSubmissions`, { headers: { Authorization: `Bearer ${token}` }});
                                const sData = await sResp.json();
                                const sub = sData.studentSubmissions ? sData.studentSubmissions[0] : null;

                                if (sub && sub.state !== 'TURNED_IN' && sub.state !== 'RETURNED') {
                                    count++;
                                    this.addTaskCard(course.name, work);
                                }
                            }
                        }
                    }

                    document.getElementById('stat-tasks').innerText = count;
                    if (count === 0) document.getElementById('tasks-empty').classList.remove('hidden');

                } catch (e) {
                    console.error(e);
                    auth.style.display = 'block';
                    container.innerHTML = "";
                }
            },

            addTaskCard(subj, work) {
                const div = document.createElement('div');
                div.className = 'task-card';
                div.innerHTML = `<div class="task-subject">${subj}</div><div class="task-title">${work.title}</div><div style="font-size:0.7rem; opacity:0.5;">Открыть детали...</div>`;
                div.onclick = () => {
                    document.getElementById('m-subject').innerText = subj;
                    document.getElementById('m-title').innerText = work.title;
                    document.getElementById('m-desc').innerText = work.description || "Нет описания.";
                    document.getElementById('m-link').onclick = () => window.open(work.alternateLink, '_blank');
                    document.getElementById('modal-overlay').style.display = 'flex';
                };
                document.getElementById('tasks-container').appendChild(div);
            },

            closeModal() { document.getElementById('modal-overlay').style.display = 'none'; },

            logout() { localStorage.removeItem('matb_token_v4'); location.reload(); },

            switchView(v) {
                document.getElementById('view-home').classList.toggle('hidden', v !== 'home');
                document.getElementById('view-tasks').classList.toggle('hidden', v !== 'tasks');
                document.getElementById('nav-home').classList.toggle('active', v === 'home');
                document.getElementById('nav-tasks').classList.toggle('active', v === 'tasks');
            },

            spawnPetals() {
                const c = document.getElementById('fx-canvas');
                for(let i=0; i<35; i++){
                    const p = document.createElement('div');
                    p.className = 'petal';
                    p.style.left = Math.random()*100+'vw';
                    p.style.width = (Math.random()*10+5)+'px';
                    p.style.height = (Math.random()*10+5)+'px';
                    p.style.animationDuration = (Math.random()*10+10)+'s';
                    p.style.animationDelay = (Math.random()*10)+'s';
                    c.appendChild(p);
                }
            },

            easterEgg() {
                const c = document.getElementById('clock-display');
                c.style.textShadow = "0 0 30px var(--accent-green)";
                setTimeout(() => c.style.textShadow = "none", 1000);
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
