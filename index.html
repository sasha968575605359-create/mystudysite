<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyHub Pro</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --bg: #064e3b; --accent: #4ade80; --text: #f8fafc; --card: rgba(15, 23, 42, 0.85); }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        
        #fx-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .flower { position: absolute; top: -10%; animation: fall linear infinite; font-size: 20px; opacity: 0.6; }
        @keyframes fall { 0% { transform: translateY(0vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }

        .container { max-width: 500px; margin: 0 auto; padding: 20px 20px 100px; position: relative; z-index: 10; }
        .glass { background: var(--card); backdrop-filter: blur(15px); border-radius: 28px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        .alert-box { background: linear-gradient(90deg, #ef4444, #f59e0b); color: white; padding: 15px; border-radius: 18px; margin-bottom: 20px; font-weight: bold; text-align: center; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }

        .btn-action { background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 16px; width: 100%; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-action:active { transform: scale(0.95); }

        .item { background: rgba(255,255,255,0.05); padding: 14px; border-radius: 16px; margin-top: 10px; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .item.break { border-left-color: #3b82f6; opacity: 0.8; font-size: 0.9rem; }
        
        .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); display: flex; border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; color: #94a3b8; cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .nav-item span { font-size: 1.6rem; margin-bottom: 4px; }

        .page { display: none; }
        .page.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="fx-layer"></div>

<div class="container">
    <div id="p-home" class="page active">
        <div class="glass" style="text-align: center; padding: 40px 20px;">
            <h1 id="clock" style="font-size: 4rem; margin: 0; letter-spacing: -2px;">00:00</h1>
            <p id="date" style="opacity: 0.8; text-transform: capitalize; font-size: 1.1rem;"></p>
        </div>

        <div class="alert-box">
            🚀 СЕГОДНЯ: Геометрия в 09:00 + Доп. Математика!
        </div>

        <div class="glass">
            <h3 style="margin-top: 0;">🔔 Умный контроль</h3>
            <button class="btn-action" onclick="App.initNotify()">ВКЛЮЧИТЬ УВЕДОМЛЕНИЯ</button>
            <p style="font-size: 0.8rem; text-align: center; margin-top: 10px; opacity: 0.6;">Сайт пришлет пуш перед началом и концом уроков.</p>
        </div>

        <div class="glass">
            <h3 style="margin-top: 0;">📅 Расписание (Четверг)</h3>
            <div id="schedule">
                </div>
        </div>
    </div>

    <div id="p-class" class="page">
        <div class="glass">
            <h2 style="text-align: center;">📚 Мой Классрум</h2>
            <div id="auth-ui" style="text-align: center;">
                <button class="btn-action" onclick="App.login()">ОБНОВИТЬ СПИСОК КУРСОВ</button>
            </div>
            <div id="courses-list" style="margin-top: 15px;"></div>
        </div>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="App.tab('p-home', this)"><span>🏠</span>ГЛАВНАЯ</div>
    <div class="nav-item" onclick="App.tab('p-class', this)"><span>🎓</span>КЛАССЫ</div>
</nav>

<script>
    const CLIENT_ID = '747337328453-pp0c1ncoagvotsjrephg9vlbf300ko90.apps.googleusercontent.com';

    // Твое расписание (Четверг)
    const DAILY_PLAN = [
        { time: "09:00", name: "Геометрия (+ Доп. Мат)", type: "lesson" },
        { time: "09:45", name: "Перемена", type: "break" },
        { time: "09:55", name: "2-й Урок", type: "lesson" },
        { time: "10:40", name: "Перемена", type: "break" },
        { time: "10:50", name: "3-й Урок", type: "lesson" },
        { time: "11:35", name: "Большая перемена", type: "break" },
        { time: "11:55", name: "4-й Урок", type: "lesson" }
    ];

    const App = {
        init() {
            this.tick();
            setInterval(() => this.tick(), 1000);
            this.renderSchedule();
            this.flowers();
        },
        tick() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('clock').innerText = timeStr;
            document.getElementById('date').innerText = now.toLocaleDateString('ru-RU', {weekday:'long', day:'numeric', month:'long'});
            
            // Проверка уведомлений каждую минуту
            if (now.getSeconds() === 0) this.checkNotifications(timeStr);
        },
        renderSchedule() {
            const container = document.getElementById('schedule');
            container.innerHTML = DAILY_PLAN.map(item => `
                <div class="item ${item.type}">
                    <span>${item.name}</span>
                    <b style="color:var(--accent)">${item.time}</b>
                </div>
            `).join('');
        },
        tab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        },
        flowers() {
            const layer = document.getElementById('fx-layer');
            for(let i=0; i<20; i++) {
                let f = document.createElement('div'); f.className = 'flower'; f.innerText = '🌸';
                f.style.left = Math.random() * 100 + 'vw';
                f.style.animationDuration = (Math.random() * 5 + 7) + 's';
                f.style.animationDelay = (Math.random() * 5) + 's';
                layer.appendChild(f);
            }
        },
        initNotify() {
            Notification.requestPermission().then(p => {
                if(p === 'granted') alert("Уведомления активированы! Я напомню о начале уроков.");
            });
        },
        checkNotifications(currentTime) {
            const event = DAILY_PLAN.find(e => e.time === currentTime);
            if (event && Notification.permission === 'granted') {
                new Notification("StudyHub: " + event.name, {
                    body: event.type === 'lesson' ? "Урок начинается, бегом в зум/класс!" : "Урок окончен, отдыхай!",
                    icon: "🌸"
                });
            }
        },
        login() {
            const client = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/classroom.courses.readonly',
                callback: (r) => { if(r.access_token) this.loadCourses(r.access_token); }
            });
            client.requestAccessToken({ prompt: 'select_account' });
        },
        async loadCourses(token) {
            const list = document.getElementById('courses-list');
            list.innerHTML = "<p style='text-align:center'>Чистим архив и грузим курсы...</p>";
            try {
                const res = await fetch('https://classroom.googleapis.com/v1/courses', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                // Фильтруем только АКТИВНЫЕ курсы
                const activeOnes = data.courses ? data.courses.filter(c => c.courseState === 'ACTIVE') : [];
                
                if (activeOnes.length > 0) {
                    document.getElementById('auth-ui').style.display = 'none';
                    list.innerHTML = activeOnes.map(c => `
                        <div class="item">
                            <div>
                                <div style="font-weight:bold">${c.name}</div>
                                <div style="font-size:0.7rem; opacity:0.6">${c.section || 'Активный курс'}</div>
                            </div>
                            <span style="font-size:1.2rem">📖</span>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = "Активных курсов не найдено.";
                }
            } catch (e) { list.innerHTML = "Ошибка связи с Google."; }
        }
    };

    App.init();
</script>
</body>
</html>
