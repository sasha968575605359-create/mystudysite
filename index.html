<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY HUB: MATB OS v3.0 FULL</title>
    <!-- Google Identity Services for Classroom API -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* PREMIUM DESIGN SYSTEM
           Designed specifically for MATB
        */
        :root {
            --bg-deep: #06231d;
            --card-dark: #111d2b;
            --accent-green: #4ade80;
            --accent-blue: #3b82f6;
            --accent-orange: #f59e0b;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --shadow-neo: 5px 5px 0px #000000;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* VISUAL FX: SAKURA ENGINE 
        */
        #fx-canvas {
            position: fixed;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .petal {
            position: absolute;
            background: #ffb7c5;
            border-radius: 150% 0 150% 0;
            opacity: 0.4;
            filter: blur(0.5px);
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); }
            25% { transform: translateY(20vh) rotate(90deg) translateX(15px); }
            50% { transform: translateY(50vh) rotate(180deg) translateX(-15px); }
            75% { transform: translateY(80vh) rotate(270deg) translateX(15px); }
            100% { transform: translateY(110vh) rotate(360deg) translateX(0); }
        }

        /* LAYOUT & CONTAINERS 
        */
        .app-container {
            max-width: 550px;
            margin: 0 auto;
            padding: 20px 20px 120px;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        /* HOME SCREEN COMPONENTS 
        */
        .clock-card {
            background: var(--card-dark);
            border-radius: 40px;
            padding: 50px 20px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .clock-time {
            font-size: 6rem;
            font-weight: 900;
            line-height: 1;
            margin: 0;
            letter-spacing: -5px;
            font-variant-numeric: tabular-nums;
        }
        .clock-date {
            color: var(--text-dim);
            font-size: 1.3rem;
            margin-top: 15px;
            text-transform: lowercase;
            font-weight: 500;
        }

        /* ALERT SYSTEM */
        .alert-banner {
            background: linear-gradient(135deg, #ef4444, #f59e0b);
            border-radius: 25px;
            padding: 18px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 800;
            font-size: 1rem;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2);
            animation: pulseBanner 2.5s infinite ease-in-out;
        }
        @keyframes pulseBanner {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.02); filter: brightness(1.2); }
        }

        /* SECTION CARDS */
        .section-card {
            background: var(--card-dark);
            border-radius: 35px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.03);
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            font-size: 1.4rem;
            font-weight: 800;
        }
        .section-header i { font-style: normal; font-size: 1.8rem; }

        /* BUTTONS */
        .btn-action {
            background: var(--accent-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 22px;
            border-radius: 22px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }
        .btn-action:active { transform: scale(0.95); }
        .btn-ai {
            background: linear-gradient(135deg, #8b5cf6, #d946ef);
            margin-bottom: 15px;
        }

        /* SCHEDULE LIST */
        .schedule-item {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 20px 25px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid var(--accent-green);
            transition: 0.3s;
        }
        .schedule-item:hover { background: rgba(255,255,255,0.06); }
        .lesson-name { font-weight: 700; font-size: 1.1rem; }
        .lesson-time { font-weight: 900; color: var(--accent-green); opacity: 0.9; }

        /* TASK CARDS: SKETCH STYLE 
           Inspired by user image uploads
        */
        .task-card {
            border: 3px solid #000;
            background: #ffffff;
            color: #000000;
            border-radius: 25px;
            padding: 25px;
            margin-top: 20px;
            position: relative;
            box-shadow: var(--shadow-neo);
            cursor: pointer;
            transition: 0.2s ease;
        }
        .task-card:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px #000;
        }
        .task-card::after {
            content: "";
            position: absolute;
            top: 15px; right: 20px;
            width: 45px; height: 6px;
            background: #000;
            border-radius: 10px;
            opacity: 0.15;
        }
        .task-subject {
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--accent-blue);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .task-card h4 {
            margin: 0 0 12px 0;
            font-family: 'Comic Sans MS', 'Marker Felt', cursive;
            font-size: 1.5rem;
            line-height: 1.2;
        }
        .task-card p {
            margin: 0;
            font-family: 'Comic Sans MS', cursive;
            opacity: 0.75;
            border-top: 2px dashed rgba(0,0,0,0.15);
            padding-top: 12px;
            font-size: 1rem;
        }

        /* MODAL SYSTEM 
        */
        #task-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 25px;
            backdrop-filter: blur(15px);
        }
        .modal-content {
            background: var(--card-dark);
            border-radius: 45px;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border: 2px solid var(--accent-green);
            text-align: center;
            position: relative;
            animation: modalIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-close {
            position: absolute;
            top: -70px; right: 0;
            font-size: 4rem;
            color: #fff;
            cursor: pointer;
        }
        .timer-display {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--danger);
            margin: 25px 0;
            background: rgba(239, 68, 68, 0.1);
            padding: 20px;
            border-radius: 25px;
            border: 2px solid var(--danger);
        }

        /* NAV BAR 
        */
        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; 
            width: 100%;
            height: 100px;
            background: #0b1521;
            display: flex;
            padding: 10px 0 25px;
            border-top: 1px solid rgba(255,255,255,0.08);
            z-index: 1000;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .nav-item {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-weight: 800;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
            gap: 5px;
        }
        .nav-item i { font-style: normal; font-size: 2rem; }
        .nav-item.active { color: var(--accent-green); transform: translateY(-5px); }

        /* UTILS */
        .hidden { display: none; }
        .loader { padding: 40px; text-align: center; font-weight: 700; color: var(--accent-green); }

        #ai-box {
            display: none;
            padding: 20px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px dashed var(--accent-blue);
            border-radius: 20px;
            margin-top: 15px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- VISUAL FX LAYER -->
    <div id="fx-canvas"></div>

    <!-- MAIN APP CONTAINER -->
    <div class="app-container">
        
        <!-- PAGE 1: DASHBOARD -->
        <div id="page-home">
            <div class="clock-card">
                <div class="clock-time" id="time-display">00:00</div>
                <div class="clock-date" id="date-display">Загрузка...</div>
            </div>

            <!-- DYNAMIC ALERT -->
            <div id="dynamic-alert" class="alert-banner">
                <i>⚠️</i>
                <span id="alert-text">СЕГОДНЯ: Доп. Математика в 09:00!</span>
            </div>

            <div class="section-card">
                <div class="section-header"><i>🤖</i> ИИ Советник</div>
                <button class="btn-action btn-ai" onclick="App.getAiFun()">МНЕ ОЧЕНЬ СКУЧНО</button>
                <div id="ai-box"></div>
            </div>

            <div class="section-card">
                <div class="section-header"><i>📅</i> Твое расписание</div>
                <div id="schedule-container">
                    <!-- Injected by JS -->
                </div>
            </div>
        </div>

        <!-- PAGE 2: ULTRA TASKS -->
        <div id="page-tasks" class="hidden">
            <div class="section-card" style="min-height: 500px;">
                <div class="section-header"><i>🚨</i> КР и Задания</div>
                <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 25px;">
                    Фильтр: Химия, Физика, Биология. Только важные номера и контрольные.
                </p>

                <div id="auth-block" style="text-align: center;">
                    <button class="btn-action" onclick="App.startAuth()">ПОДКЛЮЧИТЬ КЛАССРУМ</button>
                </div>

                <div id="tasks-list">
                    <!-- Tasks cards appear here -->
                </div>

                <button id="logout-btn" class="btn-action" style="display:none; background:rgba(239, 68, 68, 0.2); color:var(--danger); margin-top:30px;" onclick="App.logout()">ВЫЙТИ ИЗ АККАУНТА</button>
            </div>
        </div>

    </div>

    <!-- GLOBAL TASK MODAL -->
    <div id="task-modal">
        <div class="modal-content">
            <div class="modal-close" onclick="App.closeModal()">×</div>
            <div id="modal-subject" style="color:var(--accent-green); font-weight:900; font-size:0.9rem; text-transform:uppercase;">ПРЕДМЕТ</div>
            <h2 id="modal-title" style="margin: 15px 0; font-size: 1.8rem;">Заголовок</h2>
            
            <div class="timer-display">
                <div style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 5px;">ДО ДЕДЛАЙНА:</div>
                <span id="modal-timer">--д --ч --м</span>
            </div>

            <div id="modal-desc" style="text-align:left; color:var(--text-dim); max-height:150px; overflow-y:auto; padding:10px; border-top:1px solid rgba(255,255,255,0.1); margin-bottom:30px;">
                Описание...
            </div>
            
            <button class="btn-action" id="modal-btn">ОТКРЫТЬ В GOOGLE ➔</button>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <nav class="nav-bar">
        <div class="nav-item active" id="nav-home" onclick="App.switchPage('home')">
            <i>🏠</i>
            <span>Главная</span>
        </div>
        <div class="nav-item" id="nav-tasks" onclick="App.switchPage('tasks')">
            <i>📚</i>
            <span>Задания</span>
        </div>
    </nav>

    <script>
        /**
         * STUDY HUB CORE - v3.0 FULL
         * Optimized for MATB
         */
        
        const CLIENT_ID = '747337328453-pp0c1ncoagvotsjrephg9vlbf300ko90.apps.googleusercontent.com';
        
        const LESSON_TIMES = ["09:00", "09:35", "10:10", "10:45", "11:20", "11:55", "12:30", "13:05"];

        const WEEKLY_PLAN = {
            1: ["Алгебра", "География", "Укр. язык", "Биология", "Укр. язык", "Химия", "Информатика"],
            2: ["Английский (16:00)", "Геометрия", "Физика", "Укр. язык", "Биология", "Музыка/Рис.", "Физра", "Гром. освіта"],
            3: ["Химия", "Основы здоровья", "Укр. литература", "Алгебра", "История Украины", "Английский", "География", "Биология"],
            4: ["Математика Доп (9:00)", "Физика", "Физра", "Всемирная история", "Технологии", "Английский"],
            5: ["Физра", "Укр. язык", "Укр. литература", "Алгебра", "Зарубежка", "Информатика", "Немецкий"]
        };

        const App = {
            timerInterval: null,

            init() {
                this.updateTime();
                setInterval(() => this.updateTime(), 1000);
                this.spawnPetals();
                this.renderSchedule();
                this.checkAlerts();

                const savedToken = localStorage.getItem('g_token_v3');
                if (savedToken) this.loadClassroomData(savedToken);
            },

            updateTime() {
                const now = new Date();
                document.getElementById('time-display').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                document.getElementById('date-display').innerText = now.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
            },

            spawnPetals() {
                const container = document.getElementById('fx-canvas');
                for (let i = 0; i < 40; i++) {
                    const petal = document.createElement('div');
                    petal.className = 'petal';
                    const size = Math.random() * 12 + 6;
                    petal.style.width = size + 'px';
                    petal.style.height = (size * 1.5) + 'px';
                    petal.style.left = Math.random() * 100 + 'vw';
                    petal.style.animationDuration = (Math.random() * 8 + 6) + 's';
                    petal.style.animationDelay = (Math.random() * 10) + 's';
                    container.appendChild(petal);
                }
            },

            renderSchedule() {
                const day = new Date().getDay();
                const container = document.getElementById('schedule-container');
                
                if (day === 0 || day === 6) {
                    container.innerHTML = `<div style="text-align:center; padding:20px; opacity:0.5;">Выходные! Чилль, MATB. 🥤</div>`;
                    return;
                }

                const lessons = WEEKLY_PLAN[day] || [];
                container.innerHTML = lessons.map((name, i) => {
                    let time = LESSON_TIMES[i] || "--:--";
                    // Custom overrides
                    if (day === 2 && i === 0) time = "16:00";
                    if (day === 4 && i === 0) time = "09:00";

                    return `
                        <div class="schedule-item">
                            <span class="lesson-name">${name}</span>
                            <span class="lesson-time">${time}</span>
                        </div>
                    `;
                }).join('');
            },

            checkAlerts() {
                const day = new Date().getDay();
                const alertBox = document.getElementById('dynamic-alert');
                const alertText = document.getElementById('alert-text');

                if (day === 2) alertText.innerText = "СЕГОДНЯ: Английский в 16:00!";
                else if (day === 4) alertText.innerText = "СЕГОДНЯ: Математика Доп в 09:00!";
                else alertBox.classList.add('hidden');
            },

            switchPage(target) {
                document.getElementById('page-home').classList.toggle('hidden', target !== 'home');
                document.getElementById('page-tasks').classList.toggle('hidden', target !== 'tasks');
                document.getElementById('nav-home').classList.toggle('active', target === 'home');
                document.getElementById('nav-tasks').classList.toggle('active', target === 'tasks');
            },

            getAiFun() {
                const ideas = [
                    "Нарисуй граффити 'MATB' на полях тетрадки.",
                    "Попробуй угадать, какое слово учитель скажет чаще всего за урок.",
                    "Придумай 3 способа, как сбежать с урока через окно (теоретически!).",
                    "Напиши в чат класса: 'Кто не спит тот гей'.",
                    "Посчитай сколько мух на потолке."
                ];
                const box = document.getElementById('ai-box');
                box.style.display = 'block';
                box.innerText = ideas[Math.floor(Math.random() * ideas.length)];
            },

            startAuth() {
                const client = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/classroom.courses.readonly https://www.googleapis.com/auth/classroom.coursework.me.readonly',
                    callback: (res) => {
                        if (res.access_token) {
                            localStorage.setItem('g_token_v3', res.access_token);
                            this.loadClassroomData(res.access_token);
                        }
                    }
                });
                client.requestAccessToken();
            },

            async loadClassroomData(token) {
                const list = document.getElementById('tasks-list');
                const authBlock = document.getElementById('auth-block');
                const logoutBtn = document.getElementById('logout-btn');

                list.innerHTML = `<div class="loader">⚙️ ИИ СКАНИРУЕТ КЛАССРУМ...</div>`;
                authBlock.style.display = 'none';
                logoutBtn.style.display = 'block';

                try {
                    const coursesRes = await fetch('https://classroom.googleapis.com/v1/courses', {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    const coursesData = await coursesRes.json();
                    
                    if (coursesData.error) throw new Error("Expired");

                    const activeCourses = (coursesData.courses || []).filter(c => c.courseState === 'ACTIVE');
                    list.innerHTML = "";
                    let totalFound = 0;

                    for (let course of activeCourses) {
                        const lowName = course.name.toLowerCase();
                        // TARGET SUBJECTS
                        const isTarget = ['биол', 'физи', 'хими', 'біол', 'фізи', 'хімі'].some(k => lowName.includes(k));
                        if (!isTarget) continue;

                        const cwRes = await fetch(`https://classroom.googleapis.com/v1/courses/${course.id}/courseWork`, {
                            headers: { Authorization: `Bearer ${token}` }
                        });
                        const cwData = await cwRes.json();

                        if (cwData.courseWork) {
                            for (let work of cwData.courseWork) {
                                // Submission check
                                const subRes = await fetch(`https://classroom.googleapis.com/v1/courses/${course.id}/courseWork/${work.id}/studentSubmissions`, {
                                    headers: { Authorization: `Bearer ${token}` }
                                });
                                const subData = await subRes.json();
                                const subState = subData.studentSubmissions ? subData.studentSubmissions[0].state : 'NEW';

                                if (subState === 'TURNED_IN' || subState === 'RETURNED') continue;

                                // Filter keywords or files
                                const title = work.title.toLowerCase();
                                const desc = (work.description || "").toLowerCase();
                                const hasFiles = work.materials && work.materials.length > 0;
                                const hasKeywords = ["№", "номер", "стр", "стор", "кр", "контр", "тест", "лаб", "задан"].some(p => title.includes(p) || desc.includes(p));

                                if (hasKeywords || hasFiles) {
                                    totalFound++;
                                    this.renderTaskCard(course.name, work);
                                }
                            }
                        }
                    }

                    if (totalFound === 0) list.innerHTML = `<div style="text-align:center; padding:40px; opacity:0.5;">Контрольных и номеров не найдено. Спи спокойно! 🌸</div>`;

                } catch (e) {
                    list.innerHTML = `<p style="color:var(--danger); text-align:center;">Ошибка доступа. Перезайди!</p>`;
                    authBlock.style.display = 'block';
                    logoutBtn.style.display = 'none';
                }
            },

            renderTaskCard(courseName, work) {
                const container = document.getElementById('tasks-list');
                const card = document.createElement('div');
                card.className = 'task-card';
                card.innerHTML = `
                    <div class="task-subject">${courseName}</div>
                    <h4>${work.title}</h4>
                    <p>${work.description ? work.description.substring(0, 60) + "..." : "Задание внутри файла или нет описания."}</p>
                `;
                card.onclick = () => this.openModal(courseName, work);
                container.appendChild(card);
            },

            openModal(subject, work) {
                const modal = document.getElementById('task-modal');
                document.getElementById('modal-subject').innerText = subject;
                document.getElementById('modal-title').innerText = work.title;
                document.getElementById('modal-desc').innerText = work.description || "Учитель не оставил текста. Вероятно, нужно открыть прикрепленные файлы в Google Classroom.";
                document.getElementById('modal-btn').onclick = () => window.open(work.alternateLink, '_blank');

                if (work.dueDate) {
                    const deadline = new Date(work.dueDate.year, work.dueDate.month - 1, work.dueDate.day);
                    if (work.dueTime) deadline.setHours(work.dueTime.hours || 23, work.dueTime.minutes || 59);
                    
                    this.updateModalTimer(deadline);
                    if (this.timerInterval) clearInterval(this.timerInterval);
                    this.timerInterval = setInterval(() => this.updateModalTimer(deadline), 60000);
                } else {
                    document.getElementById('modal-timer').innerText = "БЕЗ СРОКА";
                }

                modal.style.display = 'flex';
            },

            updateModalTimer(deadline) {
                const now = new Date();
                const diff = deadline - now;
                const el = document.getElementById('modal-timer');

                if (diff < 0) { el.innerText = "СРОК ВЫШЕЛ"; return; }

                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

                el.innerText = `${d}д ${h}ч ${m}м`;
            },

            closeModal() {
                document.getElementById('task-modal').style.display = 'none';
                if (this.timerInterval) clearInterval(this.timerInterval);
            },

            logout() {
                localStorage.removeItem('g_token_v3');
                location.reload();
            }
        };

        window.onload = () => App.init();
    </script>
</body>
