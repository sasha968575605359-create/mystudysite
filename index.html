<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyHub - Classroom Edition</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg: #064e3b;
            --nav-bg: #1e293b;
            --text: #f8fafc;
            --accent: #4ade80;
            --card-bg: rgba(15, 23, 42, 0.9);
            --success: #22c55e;
            --error: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
        }

        /* Анимация фона */
        #fx-layer, #ground-layer { position: fixed; left: 0; width: 100%; pointer-events: none; z-index: 1; }
        #fx-layer { top: 0; height: 100%; }
        #ground-layer { bottom: 0; height: 100px; display: flex; justify-content: space-around; align-items: flex-end; padding-bottom: 80px; }
        .flower { position: absolute; top: -10%; animation: fall linear infinite; font-size: 20px; }
        @keyframes fall {
            0% { transform: translateY(0vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.2; }
        }
        .grass { font-size: 30px; animation: sway 3s ease-in-out infinite alternate; transform-origin: bottom; }
        @keyframes sway { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }

        /* Контейнер */
        .container { position: relative; z-index: 10; width: 100%; max-width: 600px; margin: 0 auto; padding: 20px 20px 110px 20px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        /* Расписание */
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { padding: 14px; background: rgba(255,255,255,0.03); border-radius: 12px; }
        .active-lesson td { background: var(--accent) !important; color: #000 !important; font-weight: bold; }

        /* Кнопки и интерфейс */
        .btn-main {
            background: var(--accent); color: #000; border: none; padding: 16px;
            border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 10px; font-size: 1rem;
        }
        .input-box {
            width: 100%; background: rgba(0,0,0,0.5); border: 2px solid var(--accent);
            border-radius: 15px; padding: 15px; color: #fff; text-align: center; font-size: 1.1rem; outline: none;
        }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .opt-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            padding: 15px; border-radius: 12px; color: #fff; cursor: pointer; font-weight: 600;
        }
        .opt-correct { background: var(--success) !important; color: #000; }
        .opt-wrong { background: var(--error) !important; }

        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--nav-bg); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .nav-item span { font-size: 1.5rem; margin-bottom: 2px; }
        .nav-item.active { color: var(--accent); background: rgba(255,255,255,0.03); }

        .progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.5s; }
    </style>
</head>
<body>

<div id="fx-layer"></div>
<div id="ground-layer"></div>

<div class="container">
    <div id="p-sched" class="page active">
        <div class="glass-card" style="text-align: center;">
            <div id="clock" style="font-size: 2.5rem; font-weight: 900;">00:00</div>
            <div id="date-label" style="opacity: 0.6;">Загрузка...</div>
        </div>
        <div class="glass-card"><table id="sched-table"></table></div>
    </div>

    <div id="p-quests" class="page">
        <div class="glass-card">
            <div id="q-box" style="text-align:center; font-size:1.2rem; font-weight:bold; min-height:60px;">Готов к урокам?</div>
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <div id="quest-content"></div>
            <button id="next-btn" class="btn-main" onclick="Engine.nextQuest()" style="display:none">Далее</button>
            <button id="start-btn" class="btn-main" onclick="Engine.nextQuest()">Начать квесты</button>
            <div id="hint" style="text-align:center; margin-top:15px; font-weight:bold;"></div>
        </div>
    </div>

    <div id="p-classroom" class="page">
        <div class="glass-card" id="classroom-main">
            <h2 style="margin-top:0">Google Classroom</h2>
            <button id="auth-btn" class="btn-main" onclick="Engine.handleAuth()">Войти в Classroom</button>
            <div id="courses-list" style="margin-top: 15px;"></div>
        </div>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="Engine.tab('p-sched', this)"><span>📅</span>УРОКИ</div>
    <div class="nav-item" onclick="Engine.tab('p-quests', this)"><span>🎯</span>КВЕСТЫ</div>
    <div class="nav-item" onclick="Engine.tab('p-classroom', this)"><span>📚</span>КЛАСС</div>
</nav>

<script>
    // Твой Client ID со скриншота
    const CLIENT_ID = '747337328453-jdr5ok0n0q6sls2seodq6r0j3adeh7s.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/classroom.courses.readonly';

    const CONFIG = {
        schedule: {
            1: [{s:"09:00",e:"09:25",n:"Алгебра"},{s:"09:35",e:"10:00",n:"География"}],
            2: [{s:"09:00",e:"09:25",n:"Английский"},{s:"10:45",e:"11:10",n:"Физика"}],
            3: [ // Среда
                {s:"09:00",e:"09:25",n:"Химия"}, {s:"09:35",e:"10:00",n:"Основы здоровья"},
                {s:"10:10",e:"10:35",n:"Укр. лит"}, {s:"10:45",e:"11:10",n:"Алгебра"},
                {s:"11:30",e:"11:55",n:"История Укр"}, {s:"12:05",e:"12:30",n:"Англ. мова"},
                {s:"12:40",e:"13:05",n:"География"}, {s:"13:15",e:"13:40",n:"Биология"}
            ],
            4: [{s:"09:00",e:"09:25",n:"Геометрия"},{s:"11:55",e:"12:20",n:"Английский"}],
            5: [{s:"09:00",e:"09:25",n:"Физра"},{s:"10:45",e:"11:10",n:"Алгебра"}]
        },
        quests: [
            {q:"Химия: Какой газ мы выдыхаем?", a:["УГЛЕКИСЛЫЙ", "CO2"]},
            {q:"Геометрия: Пифагоровы штаны во все стороны...?", a:["РАВНЫ"]},
            {q:"Алгебра: Дискриминант D = b² - ... ?", a:["4AC"]},
            {q:"Физика: В чем измеряется сила?", a:["НЬЮТОН", "N", "Н"]},
            {q:"Английский: Hello - это?", a:["ПРИВЕТ", "ЗДРАВСТВУЙ"], options:["Пока", "Привет", "Спасибо"]},
            {q:"Биология: Зеленый пигмент растений?", a:["ХЛОРОФИЛЛ"], options:["Йод", "Хлорофилл", "Кровь"]}
        ]
    };

    const Engine = {
        solved: JSON.parse(localStorage.getItem('sh_solved_final') || "[]"),
        current: null,
        gToken: sessionStorage.getItem('g_token'),

        init() {
            this.startFX();
            this.updateClock();
            setInterval(() => this.updateClock(), 1000);
            this.updateUI();
            if(this.gToken) this.loadCourses();
        },

        startFX() {
            const fx = document.getElementById('fx-layer');
            const gr = document.getElementById('ground-layer');
            for(let i=0; i<15; i++) {
                let d = document.createElement('div'); d.className='flower'; d.innerText="🌸";
                d.style.left = Math.random()*100+"vw"; d.style.animationDuration = Math.random()*5+5+"s";
                fx.appendChild(d);
            }
            for(let i=0; i<8; i++) {
                let g = document.createElement('div'); g.className='grass'; g.innerText="🌱";
                gr.appendChild(g);
            }
        },

        updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('clock').innerText = timeStr;
            const days = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
            document.getElementById('date-label').innerText = days[now.getDay()] + ", " + now.getDate();
            this.renderSched(now);
        },

        renderSched(now) {
            const day = now.getDay();
            const mins = now.getHours()*60 + now.getMinutes();
            const table = document.getElementById('sched-table');
            let html = "";
            (CONFIG.schedule[day] || []).forEach(l => {
                const [sh, sm] = l.s.split(':').map(Number);
                const [eh, em] = l.e.split(':').map(Number);
                const active = mins >= (sh*60+sm) && mins <= (eh*60+em);
                html += `<tr class="${active ? 'active-lesson' : ''}"><td>${l.s}—${l.e}</td><td>${l.n}</td></tr>`;
            });
            table.innerHTML = html || "<tr><td style='text-align:center'>Уроков нет! Отдыхай! 🍕</td></tr>";
        },

        tab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        },

        // --- КВЕСТЫ ---
        nextQuest() {
            document.getElementById('start-btn').style.display = "none";
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('hint').innerText = "";
            const pool = CONFIG.quests.filter(q => !this.solved.includes(q.q));
            if(pool.length === 0) {
                document.getElementById('q-box').innerText = "🏆 ТЫ ВСЁ РЕШИЛ!";
                document.getElementById('quest-content').innerHTML = "";
                return;
            }
            this.current = pool[Math.floor(Math.random()*pool.length)];
            document.getElementById('q-box').innerText = this.current.q;
            this.renderQuestBody();
        },

        renderQuestBody() {
            const container = document.getElementById('quest-content');
            container.innerHTML = "";
            container.style.pointerEvents = "auto";
            if(this.current.options) {
                const grid = document.createElement('div'); grid.className = 'options-grid';
                this.current.options.forEach(opt => {
                    const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = opt;
                    b.onclick = () => this.checkAns(opt, b);
                    grid.appendChild(b);
                });
                container.appendChild(grid);
            } else {
                const inp = document.createElement('input'); inp.className = 'input-box'; inp.id = 'ans-input';
                inp.placeholder = "Твой ответ...";
                inp.onkeyup = (e) => { if(e.key === "Enter") this.checkAns(inp.value); };
                container.appendChild(inp);
                const b = document.createElement('button'); b.className = 'btn-main'; b.innerText = "Проверить";
                b.onclick = () => this.checkAns(inp.value);
                container.appendChild(b);
            }
        },

        checkAns(val, btn = null) {
            if(!val) return;
            const u = val.toString().toLowerCase().trim().replace("d = b2 - ", "").replace("d = b² - ", "");
            const ok = this.current.a.some(correct => {
                const c = correct.toLowerCase().trim();
                return u === c || u.includes(c) || c.includes(u);
            });
            const h = document.getElementById('hint');
            if(ok) {
                if(btn) btn.classList.add('opt-correct');
                h.innerText = "Верно! 🔥"; h.style.color = "var(--accent)";
                this.solved.push(this.current.q);
                localStorage.setItem('sh_solved_final', JSON.stringify(this.solved));
                document.getElementById('quest-content').style.pointerEvents = "none";
                document.getElementById('next-btn').style.display = "block";
                this.updateUI();
            } else {
                if(btn) { btn.classList.add('opt-wrong'); setTimeout(() => btn.classList.remove('opt-wrong'), 500); }
                h.innerText = "Ошибка ❌"; h.style.color = "var(--error)";
            }
        },

        updateUI() {
            const p = (this.solved.length / CONFIG.quests.length) * 100;
            document.getElementById('progress-fill').style.width = p + "%";
        },

        // --- CLASSROOM ---
        handleAuth() {
            try {
                const client = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: SCOPES,
                    callback: (resp) => {
                        if (resp.access_token) {
                            this.gToken = resp.access_token;
                            sessionStorage.setItem('g_token', this.gToken);
                            this.loadCourses();
                        }
                    },
                });
                client.requestAccessToken();
            } catch (e) {
                alert("Ошибка библиотеки Google. Попробуй обновить страницу.");
            }
        },

        async loadCourses() {
            const list = document.getElementById('courses-list');
            list.innerHTML = "Загружаем курсы...";
            try {
                const r = await fetch('https://classroom.googleapis.com/v1/courses', {
                    headers: { 'Authorization': `Bearer ${this.gToken}` }
                });
                const d = await r.json();
                if (d.courses && d.courses.length > 0) {
                    list.innerHTML = d.courses.map(c => `
                        <div class="glass-card" style="margin-bottom:12px; border-left: 5px solid var(--accent); background:rgba(255,255,255,0.05)">
                            <div style="font-weight:bold; font-size:1.1rem;">${c.name}</div>
                            <div style="font-size:0.8rem; opacity:0.6; margin: 4px 0;">${c.section || 'Учебный курс'}</div>
                            <a href="${c.alternateLink}" target="_blank" style="color:var(--accent); text-decoration:none; font-size:0.9rem; font-weight:bold;">Перейти →</a>
                        </div>
                    `).join('');
                    document.getElementById('auth-btn').style.display = 'none';
                } else {
                    list.innerHTML = "Курсы не найдены. Зайди под школьным аккаунтом!";
                }
            } catch (e) {
                list.innerHTML = "Ошибка связи. Нажми кнопку входа еще раз.";
            }
        }
    };

    Engine.init();
</script>
</body>
</html>
