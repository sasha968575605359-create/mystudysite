<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyHub - Final</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --bg: #064e3b; --nav: #1e293b; --accent: #4ade80; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        
        /* Фон с цветами */
        #fx { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .flower { position: absolute; top: -10%; animation: fall linear infinite; font-size: 20px; }
        @keyframes fall { 0% { transform: translateY(0vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

        .container { position: relative; z-index: 10; max-width: 500px; margin: 0 auto; padding: 20px 20px 100px; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-main { background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 16px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--nav); display: flex; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; cursor: pointer; color: #64748b; }
        .nav-item.active { color: var(--accent); }
        .nav-item span { font-size: 1.4rem; }

        /* Стили для курсов */
        .course-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid var(--accent); text-align: left; }
    </style>
</head>
<body>

<div id="fx"></div>

<div class="container">
    <div id="p-sched" class="page active">
        <div class="glass" style="text-align:center">
            <h1 id="clock" style="font-size: 3rem; margin: 0;">00:00</h1>
            <p id="date" style="opacity:0.6"></p>
        </div>
        <div class="glass"><table id="st" style="width:100%"></table></div>
    </div>

    <div id="p-quests" class="page">
        <div class="glass">
            <div id="q-text" style="font-size:1.2rem; text-align:center; min-height:50px; font-weight:bold">Готова?</div>
            <div id="q-body" style="margin-top:20px"></div>
            <button id="q-next" class="btn-main" style="display:none" onclick="App.nextQ()">Далее</button>
            <button id="q-start" class="btn-main" onclick="App.nextQ()">Начать</button>
        </div>
    </div>

    <div id="p-class" class="page">
        <div class="glass">
            <h2 style="margin-top:0">Google Classroom</h2>
            <button id="login-btn" class="btn-main" onclick="App.login()">Войти через Google</button>
            <div id="courses" style="margin-top:20px"></div>
        </div>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="App.tab('p-sched', this)"><span>📅</span>УРОКИ</div>
    <div class="nav-item" onclick="App.tab('p-quests', this)"><span>🎯</span>КВЕСТЫ</div>
    <div class="nav-item" onclick="App.tab('p-class', this)"><span>📚</span>КЛАСС</div>
</nav>

<script>
    const CLIENT_ID = '747337328453-jdr5ok0n0q6sls2seodq6r0j3adeh7s.apps.googleusercontent.com';

    const App = {
        solved: JSON.parse(localStorage.getItem('solved_v1') || "[]"),
        quests: [
            {q:"Химия: Формула воды?", a:["H2O"]},
            {q:"Алгебра: Квадратный корень из 144?", a:["12"]},
            {q:"Английский: Apple - это?", a:["ЯБЛОКО"]},
            {q:"Физика: Скорость света выше звука?", a:["ДА"]}
        ],

        init() {
            this.genFlowers();
            this.tick();
            setInterval(() => this.tick(), 1000);
            const savedToken = sessionStorage.getItem('token');
            if(savedToken) this.loadClass(savedToken);
        },

        genFlowers() {
            const fx = document.getElementById('fx');
            for(let i=0; i<15; i++){
                let f = document.createElement('div'); f.className='flower'; f.innerText='🌸';
                f.style.left = Math.random()*100+'vw'; f.style.animationDuration = (Math.random()*5+5)+'s';
                fx.appendChild(f);
            }
        },

        tick() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('ru-RU', {weekday:'long', day:'numeric', month:'long'});
            this.drawSched(now);
        },

        drawSched(now) {
            const table = document.getElementById('st');
            const day = now.getDay();
            const sched = {
                3: [{s:"09:00", n:"Химия"}, {s:"10:10", n:"Укр Лит"}, {s:"11:30", n:"История"}]
            };
            table.innerHTML = (sched[day] || []).map(l => `<tr><td style="padding:10px">${l.s}</td><td>${l.n}</td></tr>`).join('') || "Уроков нет 🎉";
        },

        tab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        },

        // КВЕСТЫ
        nextQ() {
            document.getElementById('q-start').style.display = 'none';
            document.getElementById('q-next').style.display = 'none';
            const pool = this.quests.filter(q => !this.solved.includes(q.q));
            if(!pool.length) return document.getElementById('q-text').innerText = "Все решено! 🏆";
            this.curr = pool[Math.floor(Math.random()*pool.length)];
            document.getElementById('q-text').innerText = this.curr.q;
            document.getElementById('q-body').innerHTML = `<input id="ans" style="width:100%; padding:15px; border-radius:12px; border:none; text-align:center" placeholder="Ответ..."><button class="btn-main" onclick="App.check()">ОК</button>`;
        },

        check() {
            const val = document.getElementById('ans').value.toUpperCase().trim();
            if(this.curr.a.includes(val)) {
                this.solved.push(this.curr.q);
                localStorage.setItem('solved_v1', JSON.stringify(this.solved));
                document.getElementById('q-text').innerText = "Верно! 🔥";
                document.getElementById('q-body').innerHTML = "";
                document.getElementById('q-next').style.display = 'block';
            } else { alert("Не-а ❌"); }
        },

        // CLASSROOM
        login() {
            const client = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/classroom.courses.readonly',
                callback: (resp) => {
                    if(resp.access_token) {
                        sessionStorage.setItem('token', resp.access_token);
                        this.loadClass(resp.access_token);
                    }
                }
            });
            client.requestAccessToken();
        },

        async loadClass(token) {
            const box = document.getElementById('courses');
            box.innerHTML = "Синхронизация...";
            try {
                const r = await fetch('https://classroom.googleapis.com/v1/courses', { headers: { Authorization: `Bearer ${token}` } });
                const d = await r.json();
                if(d.courses) {
                    box.innerHTML = d.courses.map(c => `<div class="course-card"><b>${c.name}</b><br><small>${c.section || ''}</small></div>`).join('');
                    document.getElementById('login-btn').style.display = 'none';
                }
            } catch(e) { box.innerHTML = "Ошибка входа!"; }
        }
    };

    App.init();
</script>
</body>
</html>
